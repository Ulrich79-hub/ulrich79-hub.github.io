<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PiArena – Ludo Pi Network</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════
   ROOT & RESET
═══════════════════════════════════ */
:root {
  --g: #F0A500;
  --g2: #FFD060;
  --g3: #c47f00;
  --bg: #07030f;
  --bg2: #0f0720;
  --bg3: #1a0d35;
  --bg4: #231545;
  --pu: #7B2FBE;
  --pu2: #9B4FDE;
  --pu3: #5a1a9e;
  --cy: #00D4FF;
  --tx: #ede0ff;
  --tx2: #a890cc;
  --red: #ff3055;
  --blu: #3b82f6;
  --grn: #10d47a;
  --yel: #fbbf24;
  --cell: clamp(24px, 5.2vw, 36px);
  --r: 8px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%; overflow:hidden;
  background:var(--bg);
  font-family:'Exo 2', sans-serif;
  color:var(--tx);
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}

/* ═══════════════════════════════════
   SCREENS
═══════════════════════════════════ */
.screen {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  transition:opacity .45s ease, transform .45s ease;
}
.screen.hidden {
  opacity:0; pointer-events:none; transform:scale(.97);
}

/* ═══════════════════════════════════
   HOME SCREEN
═══════════════════════════════════ */
#home {
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(123,47,190,.45) 0%, transparent 65%),
    radial-gradient(ellipse 60% 40% at 80% 90%, rgba(0,212,255,.12) 0%, transparent 60%),
    var(--bg);
  gap:0;
  overflow:hidden;
}

/* Stars bg */
#home::before {
  content:'';
  position:absolute; inset:0;
  background-image:
    radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 40% 60%, rgba(255,255,255,.4) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 70% 15%, rgba(255,255,255,.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 75%, rgba(255,255,255,.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 25% 85%, rgba(255,255,255,.4) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 55% 40%, rgba(240,165,0,.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 45%, rgba(255,255,255,.35) 0%, transparent 100%),
    radial-gradient(1px 1px at 10% 55%, rgba(0,212,255,.4) 0%, transparent 100%);
  pointer-events:none;
}

/* Hexagon decorations */
#home::after {
  content:'';
  position:absolute;
  width:500px; height:500px;
  top:-150px; right:-150px;
  background:conic-gradient(from 30deg, rgba(123,47,190,.08), rgba(240,165,0,.06), rgba(123,47,190,.08));
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  animation:hexSpin 20s linear infinite;
  pointer-events:none;
}
@keyframes hexSpin { to { transform:rotate(360deg); } }

.home-inner {
  display:flex; flex-direction:column; align-items:center;
  gap:clamp(14px,2.5vh,28px);
  padding:20px 16px;
  width:100%; max-width:420px;
  position:relative; z-index:1;
}

/* LOGO */
.logo-wrap {
  display:flex; flex-direction:column; align-items:center; gap:6px;
  animation:fadeDown .8s ease both;
}
@keyframes fadeDown { from{opacity:0;transform:translateY(-24px)} to{opacity:1;transform:none} }

.logo-icon {
  width:clamp(64px,14vw,96px); height:clamp(64px,14vw,96px);
  background:linear-gradient(135deg, var(--bg3), var(--bg4));
  border:2px solid rgba(240,165,0,.4);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:clamp(28px,6vw,44px);
  box-shadow:0 0 40px rgba(240,165,0,.25), 0 0 80px rgba(123,47,190,.2), inset 0 1px 0 rgba(255,255,255,.1);
  position:relative;
}
.logo-icon::after {
  content:'';
  position:absolute; inset:-6px;
  border-radius:50%;
  border:1px solid rgba(240,165,0,.2);
  animation:orbitPulse 3s ease-in-out infinite;
}
@keyframes orbitPulse {
  0%,100%{transform:scale(1);opacity:.4}
  50%{transform:scale(1.08);opacity:.8}
}

.logo-text {
  font-family:'Cinzel', serif;
  font-size:clamp(2rem,9vw,3.4rem);
  font-weight:900;
  background:linear-gradient(135deg, var(--g2) 0%, var(--g) 40%, var(--cy) 70%, var(--g) 100%);
  background-size:300% auto;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  animation:textShimmer 4s linear infinite;
  letter-spacing:6px;
  filter:drop-shadow(0 0 20px rgba(240,165,0,.5));
}
@keyframes textShimmer { to{background-position:-300% center} }

.logo-sub {
  font-size:.72rem; letter-spacing:4px; text-transform:uppercase;
  color:var(--cy); opacity:.75;
  animation:fadeDown .8s .2s ease both;
}

/* PI WALLET BAR */
.pi-bar {
  display:flex; align-items:center; gap:10px;
  background:rgba(123,47,190,.15);
  border:1px solid rgba(123,47,190,.3);
  border-radius:50px;
  padding:8px 16px;
  cursor:pointer;
  transition:all .25s;
  animation:fadeDown .8s .3s ease both;
  font-size:.8rem;
}
.pi-bar:hover { background:rgba(123,47,190,.28); border-color:rgba(123,47,190,.55); }
.pi-dot { width:8px;height:8px;border-radius:50%;background:var(--g);box-shadow:0 0 6px var(--g); animation:blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.pi-bar.connected .pi-dot { background:var(--grn); box-shadow:0 0 6px var(--grn); animation:none; }
#pi-bar-text { color:var(--tx2); }
#pi-bar-name { color:var(--g); font-weight:700; display:none; }

/* MENU BUTTONS */
.menu-btns {
  display:flex; flex-direction:column;
  gap:clamp(8px,1.5vh,14px);
  width:100%;
  animation:fadeUp .8s .4s ease both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }

.menu-btn {
  width:100%; padding:clamp(13px,2.5vh,18px) 24px;
  border:none; border-radius:12px;
  cursor:pointer; font-family:'Exo 2',sans-serif;
  font-size:clamp(.9rem,2.5vw,1.05rem);
  font-weight:700; letter-spacing:1.5px;
  display:flex; align-items:center; gap:14px;
  position:relative; overflow:hidden;
  transition:transform .18s, box-shadow .18s;
}
.menu-btn::before {
  content:''; position:absolute; inset:0;
  background:rgba(255,255,255,.06); opacity:0; transition:opacity .15s;
}
.menu-btn:hover::before { opacity:1; }
.menu-btn:hover { transform:translateY(-2px); }
.menu-btn:active { transform:scale(.98); }

.menu-btn .btn-icon {
  width:36px;height:36px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem; flex-shrink:0;
}
.menu-btn .btn-label { display:flex; flex-direction:column; align-items:flex-start; gap:1px; }
.menu-btn .btn-title { font-size:clamp(.9rem,2.5vw,1rem); }
.menu-btn .btn-desc { font-size:.68rem; opacity:.6; font-weight:400; letter-spacing:.5px; }
.menu-btn .btn-arrow { margin-left:auto; opacity:.5; font-size:1.1rem; }

.btn-friends {
  background:linear-gradient(135deg, #1a2a5e, #0f1a3d);
  border:1px solid rgba(59,130,246,.4);
  color:white;
  box-shadow:0 4px 20px rgba(59,130,246,.15);
}
.btn-friends .btn-icon { background:rgba(59,130,246,.2); color:var(--blu); }

.btn-vs-ai {
  background:linear-gradient(135deg, #1a0d35, #2d1060);
  border:1px solid rgba(123,47,190,.45);
  color:white;
  box-shadow:0 4px 20px rgba(123,47,190,.2);
}
.btn-vs-ai .btn-icon { background:rgba(123,47,190,.25); color:var(--pu2); }

.btn-online {
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);
  color:var(--tx2);
  cursor:not-allowed;
}
.btn-online .btn-icon { background:rgba(255,255,255,.06); color:var(--tx2); }
.btn-online .btn-desc::after { content:' · Bientôt'; }

.btn-pay {
  background:linear-gradient(135deg, #2a1800, #3d2200);
  border:1px solid rgba(240,165,0,.45);
  color:white;
  box-shadow:0 4px 20px rgba(240,165,0,.18);
}
.btn-pay .btn-icon { background:rgba(240,165,0,.18); color:var(--g); }

/* Footer */
.home-footer {
  font-size:.65rem; color:rgba(255,255,255,.2);
  letter-spacing:2px; text-align:center;
  animation:fadeUp .8s .6s ease both;
}

/* ═══════════════════════════════════
   MODE SELECT OVERLAY
═══════════════════════════════════ */
#mode-overlay {
  position:fixed; inset:0;
  background:rgba(7,3,15,.85);
  backdrop-filter:blur(12px);
  z-index:200;
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .3s;
}
#mode-overlay.show { opacity:1; pointer-events:all; }

.mode-box {
  background:linear-gradient(135deg, var(--bg3), var(--bg4));
  border:1px solid rgba(123,47,190,.4);
  border-radius:16px;
  padding:24px 20px;
  width:min(340px,90vw);
  display:flex; flex-direction:column; gap:14px;
  box-shadow:0 0 60px rgba(123,47,190,.25);
}
.mode-title {
  font-family:'Cinzel',serif;
  font-size:1rem; color:var(--g);
  letter-spacing:3px; text-align:center;
}
.mode-sub { font-size:.75rem; color:var(--tx2); text-align:center; }
.player-count {
  display:flex; gap:8px;
}
.pc-btn {
  flex:1; padding:12px 4px;
  border:2px solid rgba(123,47,190,.3);
  border-radius:8px; background:rgba(123,47,190,.1);
  color:var(--tx2); font-family:'Exo 2',sans-serif;
  font-size:.9rem; font-weight:700; cursor:pointer;
  transition:all .2s;
}
.pc-btn.selected, .pc-btn:hover {
  border-color:var(--pu2); background:rgba(123,47,190,.3); color:white;
}
.mode-start {
  padding:14px; border:none; border-radius:10px;
  background:linear-gradient(135deg, var(--pu), var(--pu3));
  color:white; font-family:'Exo 2',sans-serif;
  font-size:.9rem; font-weight:700; letter-spacing:1.5px;
  cursor:pointer; transition:all .2s;
  box-shadow:0 4px 20px rgba(123,47,190,.4);
}
.mode-start:hover { transform:translateY(-2px); box-shadow:0 6px 24px rgba(123,47,190,.55); }
.mode-cancel {
  padding:10px; border:1px solid rgba(255,255,255,.1);
  border-radius:8px; background:transparent;
  color:var(--tx2); font-family:'Exo 2',sans-serif;
  font-size:.8rem; cursor:pointer; transition:all .2s;
}
.mode-cancel:hover { background:rgba(255,255,255,.06); color:var(--tx); }

/* ═══════════════════════════════════
   GAME SCREEN
═══════════════════════════════════ */
#game {
  background:var(--bg2);
  padding:0; gap:0;
  justify-content:flex-start;
}

/* TOP BAR */
.top-bar {
  width:100%; max-width:600px;
  display:flex; align-items:center; justify-content:space-between;
  padding:clamp(6px,1.5vh,10px) 12px;
  background:linear-gradient(180deg, rgba(7,3,15,.95), transparent);
  flex-shrink:0;
}
.top-logo {
  font-family:'Cinzel',serif; font-size:.85rem;
  color:var(--g); letter-spacing:3px;
}
.top-turn {
  font-size:.78rem; font-weight:600;
  color:var(--tx); letter-spacing:.5px;
  display:flex; align-items:center; gap:6px;
}
.turn-dot {
  width:10px;height:10px;border-radius:50%;
  box-shadow:0 0 8px currentColor;
  transition:background .3s, color .3s;
}
.top-back {
  background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1);
  color:var(--tx2); border-radius:6px;
  padding:5px 10px; font-size:.75rem; cursor:pointer;
  font-family:'Exo 2',sans-serif; transition:all .2s;
}
.top-back:hover { background:rgba(255,255,255,.13); color:var(--tx); }

/* PLAYERS STRIP */
.players-strip {
  width:100%; max-width:600px;
  display:flex; gap:4px; padding:0 8px;
  flex-shrink:0;
}
.player-chip {
  flex:1; border-radius:8px;
  padding:5px 6px;
  display:flex; flex-direction:column; align-items:center; gap:2px;
  border:1.5px solid transparent; transition:all .3s;
  background:rgba(255,255,255,.04);
}
.player-chip.active {
  border-color:currentColor;
  box-shadow:0 0 10px currentColor;
  background:rgba(255,255,255,.08);
  transform:translateY(-2px);
}
.chip-name { font-size:.6rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
.chip-pawns { font-size:.95rem; line-height:1; }
.chip-done { font-size:.58rem; opacity:.7; }

/* GAME CONTENT */
.game-content {
  flex:1; width:100%; max-width:600px;
  display:flex; flex-direction:column; align-items:center;
  justify-content:space-evenly;
  padding:4px 8px;
  min-height:0;
}

/* STATUS */
#gstatus {
  font-size:.8rem; color:var(--cy);
  font-weight:600; letter-spacing:.5px;
  text-align:center; min-height:18px;
  flex-shrink:0;
}

/* BOARD */
#board-wrap {
  flex-shrink:1; min-height:0;
  display:flex; align-items:center; justify-content:center;
  padding:6px;
  background:rgba(0,0,0,.4);
  border-radius:10px;
  border:1px solid rgba(123,47,190,.25);
  box-shadow:0 0 30px rgba(123,47,190,.15);
}
#board {
  display:grid;
  grid-template-columns:repeat(15, var(--cell));
  grid-template-rows:repeat(15, var(--cell));
  gap:1px;
  background:rgba(0,0,0,.6);
  border:1.5px solid rgba(240,165,0,.2);
  border-radius:3px;
  position:relative;
}

/* CELLS */
.cell {
  width:var(--cell); height:var(--cell);
  display:flex; align-items:center; justify-content:center;
  font-size:calc(var(--cell)*.3); font-weight:700;
  position:relative; border-radius:1px;
  transition:background .15s;
}
.cw { background:rgba(248,240,255,.87); }
.cr { background:rgba(255,48,85,.82); }
.cb { background:rgba(59,130,246,.82); }
.cg { background:rgba(16,212,122,.82); }
.cy { background:rgba(251,191,36,.87); }
.cs { box-shadow:inset 0 0 0 2px rgba(240,165,0,.8); }
.cc {
  background:linear-gradient(135deg,#0f0520,#1e0d40);
  color:var(--g); font-family:'Cinzel',serif;
  font-size:calc(var(--cell)*.55);
  box-shadow:inset 0 0 0 1px rgba(240,165,0,.2);
}

/* HOME BASES */
.home-base {
  position:absolute;
  width:calc(var(--cell)*6 - 2px);
  height:calc(var(--cell)*6 - 2px);
  border-radius:6px;
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:clamp(4px,1vw,8px);
  padding:clamp(8px,1.5vw,14px);
  z-index:5;
}
.hbr { top:0;left:0; background:rgba(255,48,85,.18); border:2px solid rgba(255,48,85,.4); }
.hbb { top:0;right:0; background:rgba(59,130,246,.18); border:2px solid rgba(59,130,246,.4); }
.hbg { bottom:0;right:0; background:rgba(16,212,122,.18); border:2px solid rgba(16,212,122,.4); }
.hby { bottom:0;left:0; background:rgba(251,191,36,.18); border:2px solid rgba(251,191,36,.4); }
.hslot {
  border-radius:50%;
  border:2px dashed rgba(255,255,255,.2);
  display:flex; align-items:center; justify-content:center;
}

/* PAWNS */
.pawn {
  width:clamp(16px, calc(var(--cell)*.72), 26px);
  height:clamp(16px, calc(var(--cell)*.72), 26px);
  border-radius:50%;
  border:2px solid rgba(255,255,255,.7);
  position:absolute;
  display:flex; align-items:center; justify-content:center;
  font-size:calc(var(--cell)*.24); font-weight:900;
  z-index:10; cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,.5);
  transition:transform .15s, box-shadow .15s;
}
.pawn:hover { transform:scale(1.25); z-index:20; }
.pawn.movable { animation:pmv .65s ease-in-out infinite alternate; cursor:pointer; }
@keyframes pmv {
  from{transform:scale(1); box-shadow:0 0 5px currentColor;}
  to{transform:scale(1.22); box-shadow:0 0 14px currentColor, 0 0 28px currentColor;}
}
.pawn[data-p="0"] { background:radial-gradient(circle at 35% 35%,#ff7090,var(--red)); color:#fff; }
.pawn[data-p="1"] { background:radial-gradient(circle at 35% 35%,#7ab0ff,var(--blu)); color:#fff; }
.pawn[data-p="2"] { background:radial-gradient(circle at 35% 35%,#55ffaa,var(--grn)); color:#062; }
.pawn[data-p="3"] { background:radial-gradient(circle at 35% 35%,#ffe060,var(--yel)); color:#420; }

/* BOTTOM CONTROLS */
.bottom-bar {
  width:100%; max-width:600px;
  display:flex; align-items:center; justify-content:space-between;
  padding:clamp(6px,1.5vh,10px) 12px;
  gap:10px;
  flex-shrink:0;
  background:linear-gradient(0deg, rgba(7,3,15,.98), transparent);
}

/* DICE */
.dice-wrap {
  display:flex; align-items:center; gap:10px;
}
#dice {
  width:clamp(48px,10vw,62px); height:clamp(48px,10vw,62px);
  background:linear-gradient(135deg,#fff,#e8e0f0);
  border-radius:10px;
  display:grid;
  grid-template-areas:"a . b" "c d e" "f . g";
  padding:8px; gap:4px;
  cursor:pointer;
  box-shadow:0 0 18px rgba(0,212,255,.35), 0 4px 12px rgba(0,0,0,.4);
  transition:transform .15s, box-shadow .15s;
  position:relative;
}
#dice:hover { transform:scale(1.05); box-shadow:0 0 24px rgba(0,212,255,.5); }
#dice:active { transform:scale(.95); }
#dice.rolling { animation:droll .5s ease-out; pointer-events:none; }
@keyframes droll {
  0%{transform:rotate(0) scale(1)}
  20%{transform:rotate(-25deg) scale(1.12)}
  55%{transform:rotate(18deg) scale(.93)}
  80%{transform:rotate(-8deg) scale(1.05)}
  100%{transform:rotate(0) scale(1)}
}
#dice.locked { opacity:.45; cursor:not-allowed; }
.dot { width:100%; height:100%; background:#1a0a2e; border-radius:50%; display:none; }
.dot.on { display:block; }
#dv {
  font-family:'Cinzel',serif; font-size:clamp(1.8rem,5vw,2.4rem); font-weight:700;
  color:var(--g); min-width:32px; text-align:center;
  text-shadow:0 0 12px var(--g);
}
.roll-hint { font-size:.62rem; color:var(--tx2); text-align:center; margin-top:2px; }

/* ACTION AREA */
.action-area { display:flex; gap:8px; }
.action-btn {
  padding:8px 12px; border-radius:8px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.05);
  color:var(--tx2); font-family:'Exo 2',sans-serif;
  font-size:.72rem; font-weight:600; cursor:pointer;
  transition:all .2s; letter-spacing:.5px;
}
.action-btn:hover { background:rgba(255,255,255,.1); color:var(--tx); }

/* ═══════════════════════════════════
   TOAST
═══════════════════════════════════ */
#toast {
  position:fixed; bottom:20px; left:50%;
  transform:translateX(-50%) translateY(80px);
  background:rgba(7,3,15,.96);
  border:1px solid rgba(240,165,0,.5);
  border-radius:50px; padding:10px 22px;
  font-size:.82rem; font-weight:600; color:var(--tx);
  backdrop-filter:blur(12px);
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  z-index:999; white-space:nowrap; pointer-events:none;
  box-shadow:0 4px 24px rgba(240,165,0,.15);
}
#toast.show { transform:translateX(-50%) translateY(0); }

/* ═══════════════════════════════════
   WIN OVERLAY
═══════════════════════════════════ */
#win-overlay {
  position:fixed; inset:0;
  background:rgba(7,3,15,.92);
  backdrop-filter:blur(10px);
  z-index:500;
  display:none; flex-direction:column;
  align-items:center; justify-content:center; gap:20px;
}
#win-overlay.show { display:flex; }
.win-particles { font-size:2.5rem; animation:float 2s ease-in-out infinite alternate; }
@keyframes float { from{transform:translateY(0)} to{transform:translateY(-12px)} }
.win-big {
  font-family:'Cinzel',serif;
  font-size:clamp(2.2rem,10vw,4rem); font-weight:900;
  background:linear-gradient(135deg,var(--g2),var(--cy));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  text-align:center; animation:wp 1.2s ease-in-out infinite alternate;
}
@keyframes wp {
  from{filter:drop-shadow(0 0 12px rgba(240,165,0,.5))}
  to{filter:drop-shadow(0 0 30px rgba(0,212,255,.8))}
}
.win-sub { font-size:1rem; color:var(--tx); text-align:center; }

.win-btn {

.win-btn:hover { transform:translateY(-2px); }
</style>

<script>
// ═══════════════════════════════════════════════
// PI SDK
// ═══════════════════════════════════════════════
const BACKEND = 'https://piarena-backend.onrender.com';
let piUser = null;

function initPi() {
  if (typeof Pi !== 'undefined') {
    Pi.init({ version: '2.0', sandbox: true });
  }
}

async function connectPi() {
  if (piUser) return;
  if (typeof Pi === 'undefined') {
    demoAuth(); return;
  }
  try {
    const auth = await Pi.authenticate(['username','payments'], onIncompletePayment);
    piUser = auth.user;
    setPiConnected(piUser.username);
    toast('🪙 Connecté : ' + piUser.username);
  } catch(e) {
    demoAuth();
  }
}

function demoAuth() {
  piUser = { username: 'Ulrich79' };
  setPiConnected(piUser.username);
  toast('Mode démo actif');
}

function setPiConnected(name) {
  document.getElementById('pi-dot').style.background = 'var(--grn)';
  document.getElementById('pi-dot').style.boxShadow = '0 0 6px var(--grn)';
  document.getElementById('pi-dot').style.animation = 'none';
  document.getElementById('pi-bar-text').style.display = 'none';
  const nb = document.getElementById('pi-bar-name');
  nb.style.display = 'inline';
  nb.textContent = '🪙 ' + name;
}

async function makePayment() {
  if (!piUser) { await connectPi(); }
  if (typeof Pi === 'undefined') {
    toast('🧪 Paiement sandbox simulé ✓');
    return;
  }
  try {
    await Pi.createPayment({
      amount: 1,
      memo: 'PiArena – Mise de jeu',
      metadata: { game: 'PiArena', player: piUser?.username }
    }, {
      onReadyForServerApproval: async (paymentId) => {
        await fetch(BACKEND + '/approve', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ paymentId })
        }).catch(console.error);
      },
      onReadyForServerCompletion: async (paymentId, txid) => {
        await fetch(BACKEND + '/complete', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ paymentId, txid })
        }).catch(console.error);
        toast('✅ Paiement Pi confirmé !');
      },
      onCancel: () => toast('Paiement annulé.'),
      onError: (e) => { console.error(e); toast('Erreur paiement'); }
    });
  } catch(e) { toast('Erreur Pi SDK'); }
}

function onIncompletePayment(p) { console.log('Incomplete payment:', p); }

// ═══════════════════════════════════════════════
// SCREEN NAVIGATION
// ═══════════════════════════════════════════════
let currentMode = 'ai';
let numHumans = 1;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.toggle('hidden', s.id !== id);
  });
}

function openMode(mode) {
  currentMode = mode;
  const overlay = document.getElementById('mode-overlay');
  const pcBtns = document.getElementById('pc-btns');
  const sub = document.getElementById('mode-sub');
  const title = document.getElementById('mode-title');

  if (mode === 'ai') {
    title.textContent = 'VS ORDINATEUR';
    sub.textContent = 'Toi vs 3 IA — Combien de joueurs humains ?';
    pcBtns.innerHTML = '';
    [1].forEach(n => {
      const b = document.createElement('button');
      b.className = 'pc-btn selected'; b.textContent = '1 Humain';
      b.onclick = () => { numHumans = 1; };
      pcBtns.appendChild(b);
    });
    numHumans = 1;
  } else {
    title.textContent = 'AVEC DES AMIS';
    sub.textContent = 'Combien jouent en même temps ?';
    pcBtns.innerHTML = '';
    [2,3,4].forEach(n => {
      const b = document.createElement('button');
      b.className = 'pc-btn' + (n===2?' selected':'');
      b.textContent = n + ' joueurs';
      b.onclick = () => {
        numHumans = n;
        pcBtns.querySelectorAll('.pc-btn').forEach(x => x.classList.remove('selected'));
        b.classList.add('selected');
      };
      pcBtns.appendChild(b);
    });
    numHumans = 2;
  }
  overlay.classList.add('show');
}

function closeMode() {
  document.getElementById('mode-overlay').classList.remove('show');
}

function startFromMode() {
  closeMode();
  showScreen('game');
  newGame();
}

function goHome() {
  showScreen('home');
  document.getElementById('win-overlay').classList.remove('show');
}

// ═══════════════════════════════════════════════
// LUDO ENGINE
// ═══════════════════════════════════════════════
const PNAMES = ['Rouge','Bleu','Vert','Jaune'];
const PEMOJI = ['🔴','🔵','🟢','🟡'];
const PCOLORS = ['var(--red)','var(--blu)','var(--grn)','var(--yel)'];
const NP = 4, NK = 4;

// 52-cell track
const TRACK = [
  [13,6],[12,6],[11,6],[10,6],[9,6],
  [8,5],[8,4],[8,3],[8,2],[8,1],[8,0],
  [7,0],[6,0],[6,1],[6,2],[6,3],[6,4],[6,5],
  [5,6],[4,6],[3,6],[2,6],[1,6],[0,6],
  [0,7],[0,8],[1,8],[2,8],[3,8],[4,8],[5,8],
  [6,9],[6,10],[6,11],[6,12],[6,13],[6,14],
  [7,14],[8,14],[8,13],[8,12],[8,11],[8,10],[8,9],
  [9,8],[10,8],[11,8],[12,8],[13,8],[14,8],[14,7]
];

const START_IDX = [0, 13, 26, 39];
const SAFE = new Set([0,8,13,21,26,34,39,47]);

let G = {};

function buildHumans() {
  // currentMode 'ai': 1 human, 3 AI
  // currentMode 'friends': numHumans humans, rest AI (or no AI)
  const h = [];
  for (let i = 0; i < NP; i++) {
    h.push(currentMode === 'ai' ? (i === 0) : (i < numHumans));
  }
  return h;
}

function newGame() {
  document.getElementById('win-overlay').classList.remove('show');
  G = {
    turn: 0, diceVal: 0, rolled: false, over: false,
    pawns: Array.from({length:NP}, () => Array.from({length:NK}, () => ({pos:-1}))),
    done: [0,0,0,0],
    human: buildHumans()
  };
  renderBoard();
  buildPlayersStrip();
  updateScores();
  setTurnUI(0);
  setStatus('');
  setDiceLocked(false);
  if (!G.human[0]) setTimeout(rollDice, 800);
}

// ── Dice ──
const DPAT = {1:[4],2:[1,7],3:[1,4,7],4:[1,3,5,7],5:[1,3,4,5,7],6:[1,2,3,5,6,7]};
function showDiceUI(v) {
  for(let i=1;i<=7;i++) document.getElementById('d'+i).classList.remove('on');
  (DPAT[v]||[]).forEach(i => document.getElementById('d'+i).classList.add('on'));
  document.getElementById('dv').textContent = v;
}

function setDiceLocked(locked) {
  const d = document.getElementById('dice');
  d.classList.toggle('locked', locked);
  document.getElementById('roll-hint').textContent = locked ? '...' : 'Clique pour lancer';
}

function rollDice() {
  if (G.rolled || G.over) return;
  const d = document.getElementById('dice');
  if (d.classList.contains('locked')) return;
  d.classList.add('rolling');
  setDiceLocked(true);
  setTimeout(() => d.classList.remove('rolling'), 500);
  const v = Math.floor(Math.random()*6)+1;
  G.diceVal = v; G.rolled = true;
  showDiceUI(v);
  setTimeout(() => afterRoll(G.turn, v), 560);
}

function afterRoll(p, v) {
  const mv = movable(p, v);
  if (mv.length === 0) {
    toast(PEMOJI[p] + ' Aucun coup possible');
    setTimeout(nextTurn, 600);
  } else if (G.human[p]) {
    setStatus('Tu as ' + v + ' — choisis un pion !');
    highlight(p, mv);
  } else {
    // AI picks: prefer capturing, then exiting, then furthest
    let pick = mv[Math.floor(Math.random()*mv.length)];
    setTimeout(() => doMove(p, pick, v), 700);
  }
}

function movable(p, v) {
  const res = [];
  for(let i=0;i<NK;i++){
    const pos = G.pawns[p][i].pos;
    if(pos===99) continue;
    if(pos===-1){ if(v===6) res.push(i); }
    else { if(calcNew(p,pos,v)!==null) res.push(i); }
  }
  return res;
}

function calcNew(p, cur, steps) {
  const si = START_IDX[p];
  const rel = (cur - si + 52) % 52;
  const nr = rel + steps;
  if(nr >= 52) return null;
  return (si + nr) % 52;
}

function doMove(p, pi, steps) {
  clearHL();
  const pawn = G.pawns[p][pi];
  if(pawn.pos===-1){
    pawn.pos = START_IDX[p];
    toast(PEMOJI[p] + ' sort un pion !');
  } else {
    const np = calcNew(p, pawn.pos, steps);
    if(np===null){ nextTurn(); return; }
    const rel = (pawn.pos - START_IDX[p] + 52) % 52;
    if(rel + steps >= 50){
      pawn.pos = 99; G.done[p]++;
      toast(PEMOJI[p] + ' pion arrivé ! 🏁');
      renderBoard(); updateScores();
      if(checkWin(p)) return;
      if(steps===6) reroll(p); else nextTurn();
      return;
    }
    pawn.pos = np;
    capture(p, np);
  }
  renderBoard(); updateScores();
  if(steps===6) reroll(p); else nextTurn();
}

function capture(atk, pos) {
  if(SAFE.has(pos)) return;
  for(let p=0;p<NP;p++){
    if(p===atk) continue;
    for(let i=0;i<NK;i++){
      if(G.pawns[p][i].pos===pos){
        G.pawns[p][i].pos=-1;
        toast(PEMOJI[atk]+' capture '+PEMOJI[p]+' !');
      }
    }
  }
}

function reroll(p) {
  toast(PEMOJI[p]+' — 6 ! Rejoue !');
  G.rolled = false;
  setDiceLocked(false);
  if(G.human[p]) setDiceLocked(false);
  else setTimeout(rollDice, 800);
}

function checkWin(p) {
  if(G.done[p]>=NK){
    G.over=true;
    document.getElementById('win-emoji').textContent = PEMOJI[p]+'🏆'+PEMOJI[p];
    document.getElementById('win-title').textContent = PNAMES[p]+' GAGNE !';
    document.getElementById('win-sub').textContent =
      (G.human[p] ? '🎉 Félicitations ' + (piUser?piUser.username:'Joueur') + ' !' : 'L\'IA '+PNAMES[p]+' remporte la partie !');
    document.getElementById('win-overlay').classList.add('show');
    setDiceLocked(true);
    return true;
  }
  return false;
}

function nextTurn() {
  G.rolled=false;
  G.turn=(G.turn+1)%NP;
  const p=G.turn;
  setTurnUI(p);
  setStatus('');
  setDiceLocked(false);
  document.getElementById('dv').textContent='–';
  for(let i=1;i<=7;i++) document.getElementById('d'+i).classList.remove('on');
  if(!G.human[p]) setTimeout(rollDice, 900);
}

// ── Render ──
function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML='';
  for(let r=0;r<15;r++) for(let c=0;c<15;c++){
    const el=document.createElement('div');
    el.className='cell'; el.dataset.r=r; el.dataset.c=c;
    styleCell(el,r,c);
    board.appendChild(el);
  }
  const cen=qc(board,7,7);
  if(cen){cen.className='cell cc';cen.textContent='π';}

  // Home bases
  [['hbr',0],['hbb',1],['hbg',2],['hby',3]].forEach(([cls,p])=>{
    const b=document.createElement('div');
    b.className='home-base '+cls; b.dataset.hp=p;
    for(let s=0;s<4;s++){
      const sl=document.createElement('div');
      sl.className='hslot'; sl.dataset.s=s;
      b.appendChild(sl);
    }
    board.appendChild(b);
  });

  for(let p=0;p<NP;p++) for(let i=0;i<NK;i++){
    const pw=G.pawns[p][i];
    if(pw.pos===-1) placeBase(board,p,i);
    else if(pw.pos!==99) placeTrack(board,p,i,pw.pos);
  }
}

function styleCell(el,r,c){
  if(r<=5&&c<=5){el.classList.add('cr');return;}
  if(r<=5&&c>=9){el.classList.add('cb');return;}
  if(r>=9&&c>=9){el.classList.add('cg');return;}
  if(r>=9&&c<=5){el.classList.add('cy');return;}
  if(r>=6&&r<=8&&c>=6&&c<=8){
    if(r===7&&c===7)return;
    const map={[0*3+0]:'cr',[0*3+1]:'cw',[0*3+2]:'cb',[1*3+0]:'cr',[1*3+2]:'cg',[2*3+0]:'cy',[2*3+1]:'cw',[2*3+2]:'cg'};
    el.classList.add(map[(r-6)*3+(c-6)]||'cw');return;
  }
  el.classList.add('cw');
  if(r===13&&c===6){el.className='cell cr cs';return;}
  if(r===1&&c===8){el.className='cell cb cs';return;}
  if(r===6&&c===13){el.className='cell cg cs';return;}
  if(r===8&&c===1){el.className='cell cy cs';return;}
  const stars=[[6,2],[2,6],[2,8],[6,12],[8,12],[12,8],[12,6],[8,2]];
  if(stars.some(([sr,sc])=>sr===r&&sc===c)) el.classList.add('cs');
}

function qc(board,r,c){return board.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);}

function placeBase(board,p,pi){
  const base=board.querySelector(`.home-base[data-hp="${p}"]`);
  if(!base)return;
  const slot=base.querySelectorAll('.hslot')[pi];
  if(!slot)return;
  const pw=makePawn(p,pi);
  pw.style.position='relative'; pw.style.width='78%'; pw.style.height='78%';
  slot.appendChild(pw);
}

function placeTrack(board,p,pi,tp){
  if(tp<0||tp>=TRACK.length)return;
  const[r,c]=TRACK[tp];
  const cell=qc(board,r,c);
  if(!cell)return;
  const pw=makePawn(p,pi);
  const ex=cell.querySelectorAll('.pawn').length;
  if(ex>0) pw.style.transform=`translate(${ex*5}px,${ex*-5}px)`;
  cell.appendChild(pw);
}

function makePawn(p,pi){
  const el=document.createElement('div');
  el.className='pawn'; el.dataset.p=p; el.dataset.pi=pi;
  el.textContent=['R','B','V','J'][p]+(pi+1);
  el.style.color=p<2?'white':p===2?'#062':'#420';
  el.onclick=()=>onPawnClick(p,pi);
  return el;
}

function highlight(p,mv){
  document.querySelectorAll('.pawn').forEach(el=>{
    if(+el.dataset.p===p&&mv.includes(+el.dataset.pi)) el.classList.add('movable');
  });
}
function clearHL(){document.querySelectorAll('.pawn.movable').forEach(e=>e.classList.remove('movable'));}

function onPawnClick(p,pi){
  if(!G.human[p]||p!==G.turn||!G.rolled) return;
  const mv=movable(p,G.diceVal);
  if(!mv.includes(pi)){toast('Ce pion ne peut pas bouger');return;}
  doMove(p,pi,G.diceVal);
}

// ── UI helpers ──
function buildPlayersStrip(){
  const strip=document.getElementById('players-strip');
  strip.innerHTML='';
  for(let p=0;p<NP;p++){
    const chip=document.createElement('div');
    chip.className='player-chip'+(p===0?' active':'');
    chip.dataset.p=p;
    chip.style.color=PCOLORS[p];
    chip.innerHTML=`
      <div class="chip-name">${G.human[p]?'👤':'🤖'} ${PNAMES[p]}</div>
      <div class="chip-pawns">${PEMOJI[p]}</div>
      <div class="chip-done" id="cdone${p}">0/4</div>
    `;
    strip.appendChild(chip);
  }
}

function updateScores(){
  for(let p=0;p<NP;p++){
    const el=document.getElementById('cdone'+p);
    if(el) el.textContent=G.done[p]+'/4';
    const el2=document.getElementById('sci'+p);
    if(el2) el2.textContent=G.done[p]+'/4 arrivés';
  }
}

function setTurnUI(p){
  document.querySelectorAll('.player-chip').forEach((c,i)=>c.classList.toggle('active',i===p));
  const dot=document.getElementById('turn-dot');
  dot.style.background=PCOLORS[p]; dot.style.color=PCOLORS[p];
  document.getElementById('turn-label').textContent=(G.human[p]?'👤':'🤖')+' '+PNAMES[p];
}

function setStatus(msg){
  document.getElementById('gstatus').textContent=msg;
}

let tt;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(tt); tt=setTimeout(()=>el.classList.remove('show'),3000);
}

function showHelp(){
  alert('🎲 RÈGLES PIARENA\n\n'+
    '• 4 pions par joueur\n'+
    '• 6 pour sortir de la base\n'+
    '• 6 = rejoue !\n'+
    '• Capture les pions adverses (sauf cases ★)\n'+
    '• 4 pions à l\'arrivée = VICTOIRE\n\n'+
    '🪙 PI NETWORK\n'+
    '• Mise : 1 Pi (sandbox)\n'+
    '• Backend : piarena-backend.onrender.com\n\n'+
    'github.com/Ulrich79-hub/PiArena');
}
