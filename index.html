<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PiArena – Ludo Pi Network</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');
:root {
  --pi-gold: #F0A500;
  --pi-deep: #0e0720;
  --pi-mid: #1e1040;
  --pi-accent: #7B2FBE;
  --pi-cyan: #00D4FF;
  --pi-green: #00FF88;
  --pi-red: #FF3366;
  --pi-blue: #4488FF;
  --pi-yellow: #FFD700;
  --pi-text: #E8D5FF;
  --cell: clamp(28px, 5.8vw, 38px);
}
*{margin:0;padding:0;box-sizing:border-box;}
body {
  background: var(--pi-deep);
  font-family: 'Rajdhani', sans-serif;
  color: var(--pi-text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding-bottom: 30px;
  background-image:
    radial-gradient(ellipse at 15% 15%, rgba(123,47,190,0.35) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 85%, rgba(0,212,255,0.12) 0%, transparent 55%);
}

/* HEADER */
header {
  width:100%; max-width:620px;
  padding:18px 16px 0;
  display:flex; flex-direction:column; align-items:center; gap:6px;
}
.logo {
  font-family:'Orbitron',monospace;
  font-size:clamp(2rem,8vw,3.2rem);
  font-weight:900;
  background:linear-gradient(135deg,var(--pi-gold),var(--pi-cyan),var(--pi-gold));
  background-size:200% auto;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  animation:shimmer 3s linear infinite;
  letter-spacing:4px;
  filter:drop-shadow(0 0 18px rgba(240,165,0,0.5));
}
@keyframes shimmer{0%{background-position:0% center}100%{background-position:200% center}}
.tagline{font-size:.78rem;color:var(--pi-cyan);letter-spacing:3px;text-transform:uppercase;opacity:.75;}
.version{font-size:.65rem;color:rgba(255,255,255,.3);letter-spacing:2px;}

/* PANELS */
.panel {
  width:100%; max-width:500px;
  background:rgba(123,47,190,0.12);
  border:1px solid rgba(123,47,190,0.35);
  border-radius:10px;
  padding:14px 20px;
  display:flex; flex-direction:column; align-items:center; gap:10px;
}
.panel-title {
  font-family:'Orbitron',monospace;
  font-size:.75rem; color:var(--pi-gold);
  letter-spacing:2px; text-transform:uppercase;
}

/* BUTTONS */
.btn {
  font-family:'Orbitron',monospace;
  font-weight:700; letter-spacing:1.5px;
  border:none; border-radius:5px;
  cursor:pointer; text-transform:uppercase;
  transition:all .2s; position:relative; overflow:hidden;
}
.btn::after{
  content:'';position:absolute;inset:0;
  background:rgba(255,255,255,.08);opacity:0;transition:opacity .15s;
}
.btn:hover::after{opacity:1;}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important;}

.btn-connect{
  font-size:.82rem; padding:13px 30px;
  background:linear-gradient(135deg,var(--pi-gold),#c47f00);
  color:#0e0720;
}
.btn-pay{
  font-size:.82rem; padding:13px 30px;
  background:linear-gradient(135deg,var(--pi-accent),#5510aa);
  color:white;
}
.btn-roll{
  font-size:.95rem; padding:13px 38px;
  background:linear-gradient(135deg,var(--pi-cyan),#007fa0);
  color:#0e0720; font-weight:900;
}
.btn-new{
  font-size:.72rem; padding:10px 20px;
  background:linear-gradient(135deg,var(--pi-green),#00aa55);
  color:#0e0720;
}
.btn-skip{
  font-size:.68rem; padding:8px 16px;
  background:rgba(255,255,255,.08); color:var(--pi-text);
}

/* USER BAR */
#user-bar{
  display:none; align-items:center; gap:10px;
  background:rgba(123,47,190,.2);
  border:1px solid rgba(123,47,190,.4);
  border-radius:6px; padding:8px 16px;
}
.avatar{
  width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,var(--pi-gold),var(--pi-accent));
  display:flex;align-items:center;justify-content:center;
  font-size:.8rem;font-weight:700;color:white;
}
.uname{font-weight:700;font-size:.9rem;}
.usub{font-size:.65rem;color:var(--pi-gold);font-family:'Orbitron',monospace;}

/* SCORES */
.scores{
  display:flex; gap:8px; flex-wrap:wrap;
  justify-content:center; width:100%; max-width:580px; padding:0 10px;
}
.sc{
  flex:1; min-width:100px; max-width:130px;
  border-radius:8px; padding:7px 10px;
  display:flex; flex-direction:column; align-items:center; gap:2px;
  border:2px solid transparent; transition:all .3s;
  font-size:.7rem;
}
.sc.active{box-shadow:0 0 14px currentColor;transform:translateY(-3px);}
.sc[data-p="0"]{background:rgba(255,51,102,.12);border-color:rgba(255,51,102,.35);color:var(--pi-red);}
.sc[data-p="1"]{background:rgba(68,136,255,.12);border-color:rgba(68,136,255,.35);color:var(--pi-blue);}
.sc[data-p="2"]{background:rgba(0,255,136,.12);border-color:rgba(0,255,136,.35);color:var(--pi-green);}
.sc[data-p="3"]{background:rgba(255,215,0,.12);border-color:rgba(255,215,0,.4);color:var(--pi-yellow);}
.sc-name{font-family:'Orbitron',monospace;font-size:.6rem;font-weight:700;letter-spacing:1px;}
.sc-emoji{font-size:1.3rem;}
.sc-info{opacity:.8;font-size:.65rem;}

/* STATUS */
#status{
  font-size:.88rem;color:var(--pi-cyan);
  text-align:center;font-weight:600;letter-spacing:.8px;
  min-height:20px; padding:0 12px;
}

/* DICE */
#dice-area{display:flex;align-items:center;gap:18px;}
#dice{
  width:66px;height:66px;
  background:white;border-radius:12px;
  display:grid;
  grid-template-areas:"a . b" "c d e" "f . g";
  padding:9px;gap:4px;
  box-shadow:0 0 22px rgba(0,212,255,.4);
}
#dice.rolling{animation:roll .5s ease-out;}
@keyframes roll{
  0%{transform:rotate(0) scale(1)}
  25%{transform:rotate(-22deg) scale(1.1)}
  60%{transform:rotate(14deg) scale(.95)}
  80%{transform:rotate(-6deg) scale(1.04)}
  100%{transform:rotate(0) scale(1)}
}
.dot{width:100%;height:100%;background:#1a0a2e;border-radius:50%;display:none;}
.dot.on{display:block;}
#dv{
  font-family:'Orbitron',monospace;
  font-size:2.2rem;font-weight:900;
  color:var(--pi-gold);min-width:38px;text-align:center;
  text-shadow:0 0 10px var(--pi-gold);
}

/* BOARD */
#board-wrap{
  padding:10px;
  background:rgba(0,0,0,.35);
  border-radius:12px;
  border:1px solid rgba(123,47,190,.3);
  box-shadow:0 0 36px rgba(123,47,190,.18);
}
#board{
  display:grid;
  grid-template-columns:repeat(15,var(--cell));
  grid-template-rows:repeat(15,var(--cell));
  gap:1px;
  background:rgba(0,0,0,.5);
  border:2px solid rgba(240,165,0,.25);
  border-radius:4px;
  position:relative;
}
.cell{
  width:var(--cell);height:var(--cell);
  display:flex;align-items:center;justify-content:center;
  font-size:calc(var(--cell)*.32);font-weight:700;
  position:relative;border-radius:2px;
}
.cw{background:rgba(240,235,255,.88);}
.cr{background:rgba(255,51,102,.82);}
.cb{background:rgba(68,136,255,.82);}
.cg{background:rgba(0,200,100,.82);}
.cy{background:rgba(255,215,0,.82);}
.cs{box-shadow:inset 0 0 0 2px rgba(240,165,0,.8);}
.cc{background:linear-gradient(135deg,#1a0a2e,var(--pi-accent));color:var(--pi-gold);font-family:'Orbitron',monospace;font-size:calc(var(--cell)*.55);}
.chz{opacity:1;}

/* HOME BASES */
.home-base{
  position:absolute;
  width:calc(var(--cell)*6 - 4px);
  height:calc(var(--cell)*6 - 4px);
  border-radius:8px;
  display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;
  gap:6px;padding:12px;z-index:5;
}
.hbr{top:1px;left:1px;background:rgba(255,51,102,.18);border:2px solid rgba(255,51,102,.45);}
.hbb{top:1px;right:1px;background:rgba(68,136,255,.18);border:2px solid rgba(68,136,255,.45);}
.hbg{bottom:1px;right:1px;background:rgba(0,200,100,.18);border:2px solid rgba(0,200,100,.45);}
.hby{bottom:1px;left:1px;background:rgba(255,215,0,.18);border:2px solid rgba(255,215,0,.45);}
.hslot{
  border-radius:50%;
  border:2px dashed rgba(255,255,255,.25);
  position:relative;display:flex;align-items:center;justify-content:center;
}

/* PAWNS */
.pawn{
  width:72%;height:72%;border-radius:50%;
  border:2px solid rgba(255,255,255,.75);
  position:absolute;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:calc(var(--cell)*.28);font-weight:900;
  z-index:10;box-shadow:0 2px 6px rgba(0,0,0,.5);
  transition:transform .15s,box-shadow .15s;
  user-select:none;
}
.pawn:hover{transform:scale(1.22);z-index:20;}
.pawn.movable{animation:pmove .7s ease-in-out infinite alternate;cursor:pointer;}
@keyframes pmove{
  from{transform:scale(1);box-shadow:0 0 6px currentColor;}
  to{transform:scale(1.2);box-shadow:0 0 16px currentColor;}
}
.pawn[data-p="0"]{background:radial-gradient(circle at 35% 35%,#ff6688,var(--pi-red));color:white;}
.pawn[data-p="1"]{background:radial-gradient(circle at 35% 35%,#88aaff,var(--pi-blue));color:white;}
.pawn[data-p="2"]{background:radial-gradient(circle at 35% 35%,#55ffaa,var(--pi-green));color:#0e0720;}
.pawn[data-p="3"]{background:radial-gradient(circle at 35% 35%,#ffe060,var(--pi-yellow));color:#0e0720;}

/* CONTROLS */
#controls{
  display:flex;flex-direction:column;align-items:center;
  gap:10px;padding:6px 0 10px;width:100%;max-width:580px;
}
.ctrl-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}

/* TOAST */
#toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:rgba(14,7,32,.96);
  border:1px solid var(--pi-gold);
  border-radius:8px;padding:11px 22px;
  font-size:.85rem;font-weight:600;color:var(--pi-text);
  backdrop-filter:blur(10px);
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  z-index:1000;max-width:300px;text-align:center;pointer-events:none;
}
#toast.show{transform:translateX(-50%) translateY(0);}

/* WIN */
#win-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(8,3,20,.9);backdrop-filter:blur(8px);
  z-index:500;flex-direction:column;
  align-items:center;justify-content:center;gap:22px;
}
#win-overlay.show{display:flex;}
.win-title{
  font-family:'Orbitron',monospace;
  font-size:clamp(2rem,10vw,4rem);font-weight:900;
  background:linear-gradient(135deg,var(--pi-gold),var(--pi-cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:wp 1s ease-in-out infinite alternate;text-align:center;
}
@keyframes wp{
  from{filter:drop-shadow(0 0 10px rgba(240,165,0,.5));}
  to{filter:drop-shadow(0 0 28px rgba(0,212,255,.8));}
}
.win-sub{font-size:1rem;color:var(--pi-text);text-align:center;padding:0 20px;}

@media(max-width:420px){
  :root{--cell:clamp(22px,6.2vw,30px);}
  .btn{font-size:.7rem;padding:10px 16px;}
}
</style>
</head>
<body>

<header>
  <div class="logo">π ARENA</div>
  <div class="tagline">Ludo Game · Pi Network</div>
  <div class="version">v2.0 · sandbox · backend live</div>

  <!-- STEP 1: Connect -->
  <div id="step-connect">
    <button class="btn btn-connect" onclick="connectPi()">🪙 Connecter Pi Wallet</button>
  </div>

  <!-- User info (after auth) -->
  <div id="user-bar">
    <div class="avatar" id="uavatar">?</div>
    <div>
      <div class="uname" id="uname">–</div>
      <div class="usub">Pi Sandbox · Connecté ✓</div>
    </div>
  </div>

  <!-- STEP 2: Pay -->
  <div class="panel" id="pay-panel" style="display:none;">
    <div class="panel-title">⚡ Mise de jeu</div>
    <div style="font-size:2rem;font-family:'Orbitron',monospace;color:var(--pi-cyan);">π 1.00</div>
    <div style="font-size:.78rem;opacity:.7;text-align:center;">Payer 1 Pi pour rejoindre la partie (sandbox testnet)</div>
    <button class="btn btn-pay" id="btn-pay" onclick="makePayment()">🎮 Jouer pour 1 Pi</button>
    <button class="btn btn-skip" onclick="skipPayment()">Jouer sans payer (démo)</button>
  </div>
</header>

<!-- SCORES -->
<div class="scores" id="scores-bar">
  <div class="sc active" data-p="0"><div class="sc-name">ROUGE</div><div class="sc-emoji">🔴</div><div class="sc-info" id="sci0">0/4 arrivés</div></div>
  <div class="sc" data-p="1"><div class="sc-name">BLEU</div><div class="sc-emoji">🔵</div><div class="sc-info" id="sci1">0/4 arrivés</div></div>
  <div class="sc" data-p="2"><div class="sc-name">VERT</div><div class="sc-emoji">🟢</div><div class="sc-info" id="sci2">0/4 arrivés</div></div>
  <div class="sc" data-p="3"><div class="sc-name">JAUNE</div><div class="sc-emoji">🟡</div><div class="sc-info" id="sci3">0/4 arrivés</div></div>
</div>

<div id="status">Connecte ton Pi Wallet pour commencer !</div>

<!-- DICE -->
<div id="dice-area">
  <div id="dice">
    <div class="dot" id="d1" style="grid-area:a"></div>
    <div class="dot" id="d2" style="grid-area:b"></div>
    <div class="dot" id="d3" style="grid-area:c"></div>
    <div class="dot" id="d4" style="grid-area:d"></div>
    <div class="dot" id="d5" style="grid-area:e"></div>
    <div class="dot" id="d6" style="grid-area:f"></div>
    <div class="dot" id="d7" style="grid-area:g"></div>
  </div>
  <div id="dv">–</div>
</div>

<!-- BOARD -->
<div id="board-wrap">
  <div id="board"></div>
</div>

<!-- CONTROLS -->
<div id="controls">
  <div class="ctrl-row">
    <button class="btn btn-roll" id="btn-roll" onclick="rollDice()" disabled>🎲 Lancer le dé</button>
  </div>
  <div class="ctrl-row">
    <button class="btn btn-new" onclick="newGame()">🔄 Nouvelle partie</button>
    <button class="btn btn-skip" onclick="showHelp()">ℹ️ Règles</button>
  </div>
</div>

<!-- WIN -->
<div id="win-overlay">
  <div class="win-title" id="win-title">VICTOIRE !</div>
  <div class="win-sub" id="win-sub"></div>
  <button class="btn btn-new" onclick="newGame();document.getElementById('win-overlay').classList.remove('show')">🔄 Rejouer</button>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════
// PI SDK + BACKEND INTEGRATION
// ══════════════════════════════════════════
const BACKEND = 'https://piarena-backend.onrender.com';
let piUser = null;
let gameReady = false;

function initPi() {
  if (typeof Pi !== 'undefined') {
    Pi.init({ version: '2.0', sandbox: true });
    setStatus('SDK Pi chargé ✓ · Mode sandbox');
  } else {
    setStatus('⚠️ Pi SDK absent — utilise Pi Browser');
  }
}

async function connectPi() {
  if (typeof Pi === 'undefined') {
    toast('Pi Browser requis. Mode démo activé.');
    demoLogin(); return;
  }
  try {
    const auth = await Pi.authenticate(['username', 'payments'], onIncompletePayment);
    piUser = auth.user;
    showUser(piUser.username);
    toast('🪙 Connecté : ' + piUser.username);
    setStatus('Bienvenue ' + piUser.username + ' ! Paye pour jouer ↓');
  } catch(e) {
    toast('Auth annulée — mode démo');
    demoLogin();
  }
}

function demoLogin() {
  piUser = { username: 'DemoUser' };
  showUser(piUser.username);
  setStatus('Mode démo actif');
}

function showUser(name) {
  document.getElementById('step-connect').style.display = 'none';
  document.getElementById('user-bar').style.display = 'flex';
  document.getElementById('uname').textContent = name;
  document.getElementById('uavatar').textContent = name[0].toUpperCase();
  document.getElementById('pay-panel').style.display = 'flex';
}

async function makePayment() {
  const btn = document.getElementById('btn-pay');
  btn.disabled = true;
  btn.textContent = '⏳ Traitement...';

  if (typeof Pi === 'undefined') {
    toast('🧪 Paiement sandbox simulé ✓');
    startGame(); return;
  }

  try {
    await Pi.createPayment({
      amount: 1,
      memo: 'PiArena – Mise de jeu Ludo',
      metadata: { game: 'PiArena', player: piUser?.username }
    }, {
      onReadyForServerApproval: async (paymentId) => {
        try {
          const r = await fetch(BACKEND + '/approve', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paymentId })
          });
          const d = await r.json();
          console.log('Approve:', d);
        } catch(e) { console.error('Approve error:', e); }
      },
      onReadyForServerCompletion: async (paymentId, txid) => {
        try {
          const r = await fetch(BACKEND + '/complete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paymentId, txid })
          });
          const d = await r.json();
          console.log('Complete:', d);
          toast('✅ Paiement Pi confirmé ! tx:' + txid.slice(0,8) + '…');
          startGame();
        } catch(e) {
          console.error('Complete error:', e);
          toast('Erreur serveur — mode démo activé');
          startGame();
        }
      },
      onCancel: () => {
        toast('Paiement annulé.');
        btn.disabled = false;
        btn.textContent = '🎮 Jouer pour 1 Pi';
      },
      onError: (err) => {
        console.error('Pi payment error:', err);
        toast('Erreur Pi — mode démo activé');
        startGame();
      }
    });
  } catch(e) {
    toast('Erreur — mode démo activé');
    startGame();
  }
}

function onIncompletePayment(payment) {
  console.log('Paiement incomplet:', payment);
  toast('Paiement incomplet détecté — vérification…');
}

function skipPayment() {
  document.getElementById('pay-panel').style.display = 'none';
  toast('Mode démo · Bonne partie !');
  startGame();
}

function startGame() {
  gameReady = true;
  document.getElementById('pay-panel').style.display = 'none';
  newGame();
  toast('🎮 Partie lancée !');
}

// ══════════════════════════════════════════
// LUDO GAME ENGINE
// ══════════════════════════════════════════
const PNAMES = ['Rouge','Bleu','Vert','Jaune'];
const PEMOJI = ['🔴','🔵','🟢','🟡'];
const PCOLOR = ['red','blue','green','yellow'];
const NUM_PLAYERS = 4;
const NUM_PAWNS = 4;

// 52-cell track: [row, col] on 15×15 grid
const TRACK = [
  [13,6],[12,6],[11,6],[10,6],[9,6],
  [8,5],[8,4],[8,3],[8,2],[8,1],[8,0],
  [7,0],[6,0],
  [6,1],[6,2],[6,3],[6,4],[6,5],
  [5,6],[4,6],[3,6],[2,6],[1,6],[0,6],
  [0,7],[0,8],
  [1,8],[2,8],[3,8],[4,8],[5,8],
  [6,9],[6,10],[6,11],[6,12],[6,13],[6,14],
  [7,14],[8,14],
  [8,13],[8,12],[8,11],[8,10],[8,9],
  [9,8],[10,8],[11,8],[12,8],[13,8],[14,8],
  [14,7]
];

// Track starting index for each player
const START_IDX = [0, 13, 26, 39];
// Safe squares (absolute track indices)
const SAFE = new Set([0,8,13,21,26,34,39,47]);

let G = {}; // game state

function newGame() {
  G = {
    turn: 0,
    diceVal: 0,
    rolled: false,
    over: false,
    pawns: Array.from({length:NUM_PLAYERS}, () =>
      Array.from({length:NUM_PAWNS}, () => ({pos:-1})) // -1=base, 0-51=track, 99=finished
    ),
    done: [0,0,0,0],
    human: [true, false, false, false]
  };
  renderBoard();
  updateScores();
  setStatus('Tour de ' + PNAMES[0] + ' ' + PEMOJI[0]);
  document.getElementById('win-overlay').classList.remove('show');
  document.querySelectorAll('.sc').forEach((c,i) => c.classList.toggle('active', i===0));
  if (gameReady) setRollEnabled(true);
}

// ── Dice ──
const DPAT = {1:[4],2:[1,7],3:[1,4,7],4:[1,3,5,7],5:[1,3,4,5,7],6:[1,2,3,5,6,7]};
function showDiceUI(v) {
  for(let i=1;i<=7;i++) document.getElementById('d'+i).classList.remove('on');
  (DPAT[v]||[]).forEach(i => document.getElementById('d'+i).classList.add('on'));
  document.getElementById('dv').textContent = v;
}

function rollDice() {
  if (!gameReady || G.rolled || G.over) return;
  const de = document.getElementById('dice');
  de.classList.add('rolling');
  setTimeout(() => de.classList.remove('rolling'), 500);
  const v = Math.floor(Math.random()*6)+1;
  G.diceVal = v; G.rolled = true;
  showDiceUI(v);
  setRollEnabled(false);
  setTimeout(() => afterRoll(G.turn, v), 560);
}

function afterRoll(p, v) {
  const mv = movable(p, v);
  if (mv.length === 0) {
    toast(PEMOJI[p] + ' Aucun mouvement possible');
    nextTurn();
  } else if (G.human[p]) {
    setStatus('Tu as ' + v + ' — clique sur un pion !');
    highlight(p, mv);
  } else {
    const pick = mv[Math.floor(Math.random()*mv.length)];
    setTimeout(() => doMove(p, pick, v), 650);
  }
}

// ── Movement logic ──
function movable(p, v) {
  const res = [];
  for (let i=0;i<NUM_PAWNS;i++) {
    const pos = G.pawns[p][i].pos;
    if (pos === 99) continue;
    if (pos === -1) { if (v===6) res.push(i); }
    else { if (calcNewPos(p,pos,v) !== null) res.push(i); }
  }
  return res;
}

function calcNewPos(p, cur, steps) {
  const si = START_IDX[p];
  const rel = (cur - si + 52) % 52;
  const nr = rel + steps;
  if (nr >= 52) return null; // can't overshoot (simplified)
  return (si + nr) % 52;
}

function doMove(p, pi, steps) {
  clearHL();
  const pawn = G.pawns[p][pi];

  if (pawn.pos === -1) {
    pawn.pos = START_IDX[p];
    toast(PEMOJI[p] + ' sort un pion !');
  } else {
    const np = calcNewPos(p, pawn.pos, steps);
    if (np === null) { nextTurn(); return; }
    const si = START_IDX[p];
    const rel = (pawn.pos - si + 52) % 52;
    if (rel + steps >= 50) {
      pawn.pos = 99; G.done[p]++;
      toast(PEMOJI[p] + ' pion arrivé ! 🏁');
      renderBoard(); updateScores();
      if (checkWin(p)) return;
      if (steps===6) reroll(p); else nextTurn();
      return;
    }
    pawn.pos = np;
    capture(p, pi, np);
  }

  renderBoard(); updateScores();
  if (steps===6) reroll(p); else nextTurn();
}

function capture(attacker, aPawn, pos) {
  if (SAFE.has(pos)) return;
  for (let p=0;p<NUM_PLAYERS;p++) {
    if (p===attacker) continue;
    for (let i=0;i<NUM_PAWNS;i++) {
      if (G.pawns[p][i].pos===pos) {
        G.pawns[p][i].pos=-1;
        toast(PEMOJI[attacker]+' capture '+PEMOJI[p]+' !');
      }
    }
  }
}

function reroll(p) {
  toast(PEMOJI[p]+' — 6 ! Rejoue !');
  G.rolled = false;
  if (G.human[p]) setRollEnabled(true);
  else setTimeout(rollDice, 800);
}

function checkWin(p) {
  if (G.done[p] >= NUM_PAWNS) {
    G.over = true;
    document.getElementById('win-title').textContent = PEMOJI[p]+' VICTOIRE !';
    document.getElementById('win-sub').textContent =
      PNAMES[p]+' remporte PiArena ! 🏆'+(piUser?' · Bravo '+piUser.username+'!':'');
    document.getElementById('win-overlay').classList.add('show');
    setRollEnabled(false);
    return true;
  }
  return false;
}

function nextTurn() {
  G.rolled = false;
  G.turn = (G.turn+1) % NUM_PLAYERS;
  const p = G.turn;
  document.querySelectorAll('.sc').forEach((c,i) => c.classList.toggle('active',i===p));
  setStatus('Tour de '+PNAMES[p]+' '+PEMOJI[p]);
  if (G.human[p]) setRollEnabled(true);
  else setTimeout(rollDice, 900);
}

// ── Rendering ──
function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  for (let r=0;r<15;r++) {
    for (let c=0;c<15;c++) {
      const el = document.createElement('div');
      el.className = 'cell';
      el.dataset.r=r; el.dataset.c=c;
      styleCell(el,r,c);
      board.appendChild(el);
    }
  }

  // Center
  const cen = qCell(board,7,7);
  if(cen){cen.className='cell cc';cen.textContent='π';}

  // Home bases
  [['hbr',0],['hbb',1],['hbg',2],['hby',3]].forEach(([cls,p])=>{
    const base = document.createElement('div');
    base.className='home-base '+cls;
    base.dataset.hp=p;
    for(let s=0;s<4;s++){
      const sl=document.createElement('div');
      sl.className='hslot';sl.dataset.s=s;
      base.appendChild(sl);
    }
    board.appendChild(base);
  });

  // Place pawns
  for(let p=0;p<NUM_PLAYERS;p++){
    for(let i=0;i<NUM_PAWNS;i++){
      const pw=G.pawns[p][i];
      if(pw.pos===-1) placeBase(board,p,i);
      else if(pw.pos!==99) placeTrack(board,p,i,pw.pos);
    }
  }
}

function styleCell(el,r,c){
  // Corner home zones
  if(r<=5&&c<=5){el.classList.add('cr','chz');return;}
  if(r<=5&&c>=9){el.classList.add('cb','chz');return;}
  if(r>=9&&c>=9){el.classList.add('cg','chz');return;}
  if(r>=9&&c<=5){el.classList.add('cy','chz');return;}
  // Center area
  if(r>=6&&r<=8&&c>=6&&c<=8){
    if(r===7&&c===7)return;
    const map={60:'cr',61:'cw',62:'cb',70:'cr',72:'cg',80:'cy',81:'cw',82:'cg'};
    const k=r*10+c-60;
    el.classList.add(map[(r-6)*10+(c-6)] || 'cw');
    return;
  }
  el.classList.add('cw');
  // Colored starts
  if(r===13&&c===6){el.classList.remove('cw');el.classList.add('cr','cs');return;}
  if(r===1&&c===8){el.classList.remove('cw');el.classList.add('cb','cs');return;}
  if(r===6&&c===13){el.classList.remove('cw');el.classList.add('cg','cs');return;}
  if(r===8&&c===1){el.classList.remove('cw');el.classList.add('cy','cs');return;}
  // Safe stars
  const starCells=[[6,2],[2,6],[2,8],[6,12],[8,12],[12,8],[12,6],[8,2]];
  if(starCells.some(([sr,sc])=>sr===r&&sc===c)) el.classList.add('cs');
}

function qCell(board,r,c){return board.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);}

function placeBase(board,p,pi){
  const base=board.querySelector(`.home-base[data-hp="${p}"]`);
  if(!base)return;
  const slot=base.querySelectorAll('.hslot')[pi];
  if(!slot)return;
  const pawn=makePawn(p,pi);
  pawn.style.position='relative';pawn.style.width='78%';pawn.style.height='78%';
  slot.appendChild(pawn);
}

function placeTrack(board,p,pi,tpos){
  if(tpos<0||tpos>=TRACK.length)return;
  const[r,c]=TRACK[tpos];
  const cell=qCell(board,r,c);
  if(!cell)return;
  const pawn=makePawn(p,pi);
  const ex=cell.querySelectorAll('.pawn').length;
  if(ex>0) pawn.style.transform=`translate(${ex*5}px,${ex*-5}px)`;
  cell.appendChild(pawn);
}

function makePawn(p,pi){
  const el=document.createElement('div');
  el.className='pawn';
  el.dataset.p=p;el.dataset.pi=pi;
  el.textContent=['R','B','V','J'][p]+(pi+1);
  el.onclick=()=>onPawnClick(p,pi);
  return el;
}

function highlight(p,mv){
  document.querySelectorAll('.pawn').forEach(el=>{
    if(+el.dataset.p===p && mv.includes(+el.dataset.pi))
      el.classList.add('movable');
  });
}
function clearHL(){document.querySelectorAll('.pawn.movable').forEach(e=>e.classList.remove('movable'));}

function onPawnClick(p,pi){
  if(!G.human[p]||p!==G.turn||!G.rolled)return;
  const mv=movable(p,G.diceVal);
  if(!mv.includes(pi)){toast('Ce pion ne peut pas bouger !');return;}
  doMove(p,pi,G.diceVal);
}

// ── Scores ──
function updateScores(){
  for(let p=0;p<NUM_PLAYERS;p++){
    const done=G.done[p];
    const inbase=G.pawns[p].filter(pw=>pw.pos===-1).length;
    document.getElementById('sci'+p).textContent=done+'/4 arrivés · '+inbase+' en base';
  }
}

// ── Utils ──
function setStatus(msg){document.getElementById('status').textContent=msg;}
function setRollEnabled(v){
  const b=document.getElementById('btn-roll');
  b.disabled=!v;b.style.opacity=v?'1':'.3';
}
let tt;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),3200);
}
function showHelp(){
  alert(
    '🎲 RÈGLES PIARENA\n\n'+
    '• 4 pions chacun\n'+
    '• Besoin d\'un 6 pour sortir de la base\n'+
    '• 6 = rejoue !\n'+
    '• Capture les pions adverses (sauf cases ★ sûres)\n'+
    '• 4 pions à l\'arrivée = VICTOIRE\n\n'+
    '🪙 PI NETWORK\n'+
    '• Mise : 1 Pi (sandbox testnet)\n'+
    '• Backend : piarena-backend.onrender.com\n'+
    '• /approve et /complete appelés automatiquement\n\n'+
    'github.com/Ulrich79-hub/PiArena'
  );
}

window.addEventListener('load',()=>{
  initPi();
  newGame();
});
