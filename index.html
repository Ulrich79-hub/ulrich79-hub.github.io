<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PiArena</title>

  <link rel="stylesheet" href="css/style.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <!-- Pi SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body>

<!-- APP ROOT -->
<div id="app">

  <!-- TOP BAR -->
  <header id="topbar">
    <div class="logo">π ARENA</div>

    <div class="currencies">
      <span>🪙 <b id="coins">0</b></span>
      <span>💎 <b id="gems">0</b></span>
      <span>π <b id="pi">0.0</b></span>
    </div>

    <button id="shopBtn">+</button>
  </header>

  <!-- PAGES -->
  <main id="pages">

    <section id="home" class="page active"></section>
    <section id="event" class="page"></section>
    <section id="shop" class="page"></section>
    <section id="profile" class="page"></section>

  </main>

  <!-- NAV -->
  <nav id="bottomnav">
    <button data-page="home">🏠</button>
    <button data-page="event">🎪</button>
    <button data-page="shop">💎</button>
    <button data-page="profile">👤</button>
  </nav>

</div>

<!-- GAME -->
<div id="game" class="hidden">
  <canvas id="board"></canvas>

  <button id="rollBtn">Lancer</button>
</div>

<!-- MODALS -->
<div id="modal"></div>

<script src="js/app.js"></script>
<script src="js/game.js"></script>
<script src="js/shop.js"></script>
<script src="js/firebase.js"></script>
<script src="js/pi.js"></script>

</body>
</html>
