<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PiArena</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>

<!-- APP -->
<div id="app">

  <!-- TOP -->
  <div id="topbar">
    <div class="logo">PI ARENA</div>

    <div class="coins">
      🪙 <span id="coins">0</span>
      💎 <span id="gems">0</span>
      π <span id="pi">0.0</span>
    </div>

    <button onclick="showPage('shop')">+</button>
  </div>

  <!-- PAGES -->
  <div id="pages">

    <div id="home" class="page active">
      <h2>Accueil</h2>
      <button onclick="openGame()">Jouer</button>
    </div>

    <div id="shop" class="page">
      <h2>Boutique</h2>
      <button onclick="buyCoins()">Acheter coins</button>
    </div>

    <div id="profile" class="page">
      <h2>Profil</h2>
    </div>

  </div>

  <!-- NAV -->
  <div id="nav">
    <button onclick="showPage('home')">🏠</button>
    <button onclick="showPage('shop')">🛒</button>
    <button onclick="showPage('profile')">👤</button>
  </div>

</div>

<!-- GAME -->
<div id="game" style="display:none;">
  <h2>Jeu Ludo</h2>
  <button onclick="rollDice()">Lancer dé</button>
  <p id="dice">-</p>
  <button onclick="closeGame()">Quitter</button>
</div>

<script src="js/app.js"></script>
<script src="js/game.js"></script>
<script src="js/shop.js"></script>
<script src="js/firebase.js"></script>
<script src="js/pi.js"></script>

</body>
</html>
