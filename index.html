<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PiArena – Ludo Pi Network</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');

  :root {
    --pi-gold: #F0A500;
    --pi-deep: #1a0a2e;
    --pi-mid: #2d1b5e;
    --pi-accent: #7B2FBE;
    --pi-cyan: #00D4FF;
    --pi-green: #00FF88;
    --pi-red: #FF3366;
    --pi-blue: #3366FF;
    --pi-yellow: #FFD700;
    --pi-text: #E8D5FF;
    --board-size: min(90vw, 540px);
    --cell: calc(var(--board-size) / 15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--pi-deep);
    font-family: 'Rajdhani', sans-serif;
    color: var(--pi-text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(123,47,190,0.3) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(0,212,255,0.15) 0%, transparent 50%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%237B2FBE' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  /* ===== HEADER ===== */
  header {
    width: 100%;
    max-width: 700px;
    padding: 20px 20px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2rem, 8vw, 3.5rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--pi-gold), var(--pi-cyan), var(--pi-gold));
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s linear infinite;
    letter-spacing: 4px;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(240,165,0,0.5));
  }

  @keyframes shimmer {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  .tagline {
    font-size: 0.85rem;
    color: var(--pi-cyan);
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.8;
  }

  /* ===== PI AUTH PANEL ===== */
  #auth-panel {
    margin: 16px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .pi-btn {
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 12px 28px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.25s;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
  }

  .pi-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.1);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .pi-btn:hover::before { opacity: 1; }
  .pi-btn:active { transform: scale(0.97); }

  .btn-connect {
    background: linear-gradient(135deg, var(--pi-gold), #c47f00);
    color: #1a0a2e;
  }

  .btn-pay {
    background: linear-gradient(135deg, var(--pi-accent), #5a1a9e);
    color: white;
    font-size: 0.75rem;
  }

  .btn-roll {
    background: linear-gradient(135deg, var(--pi-cyan), #0099bb);
    color: #1a0a2e;
    font-size: 1rem;
    padding: 14px 40px;
    font-weight: 900;
  }

  .btn-new-game {
    background: linear-gradient(135deg, var(--pi-green), #00aa55);
    color: #1a0a2e;
    font-size: 0.75rem;
  }

  .btn-disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  #user-info {
    display: none;
    align-items: center;
    gap: 10px;
    background: rgba(123,47,190,0.2);
    border: 1px solid rgba(123,47,190,0.4);
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 0.85rem;
  }

  #user-info .avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pi-gold), var(--pi-accent));
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 700; color: white;
  }

  .pi-balance {
    color: var(--pi-gold);
    font-weight: 700;
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
  }

  /* ===== STATUS BAR ===== */
  #status-bar {
    width: 100%;
    max-width: 600px;
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  #status-msg {
    font-size: 0.9rem;
    color: var(--pi-cyan);
    text-align: center;
    min-height: 20px;
    font-weight: 600;
    letter-spacing: 1px;
  }

  /* ===== SCORE BANNER ===== */
  .scores {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 600px;
    padding: 0 12px;
  }

  .score-card {
    flex: 1;
    min-width: 110px;
    max-width: 140px;
    border-radius: 8px;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    border: 2px solid transparent;
    transition: all 0.3s;
  }

  .score-card.active-player {
    box-shadow: 0 0 16px currentColor;
    transform: translateY(-3px);
  }

  .score-card[data-player="0"] { background: rgba(255,51,102,0.15); border-color: rgba(255,51,102,0.4); color: var(--pi-red); }
  .score-card[data-player="1"] { background: rgba(51,102,255,0.15); border-color: rgba(51,102,255,0.4); color: var(--pi-blue); }
  .score-card[data-player="2"] { background: rgba(0,255,136,0.15); border-color: rgba(0,255,136,0.4); color: var(--pi-green); }
  .score-card[data-player="3"] { background: rgba(255,215,0,0.15); border-color: rgba(255,215,0,0.5); color: var(--pi-yellow); }

  .score-name { font-family: 'Orbitron', monospace; font-size: 0.65rem; font-weight: 700; letter-spacing: 1px; }
  .score-pawns { font-size: 1.4rem; }
  .score-home { font-size: 0.7rem; opacity: 0.8; }

  /* ===== DICE ===== */
  #dice-area {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 8px 0;
  }

  #dice {
    width: 70px; height: 70px;
    background: white;
    border-radius: 12px;
    display: grid;
    grid-template-areas:
      "a . b"
      "c d e"
      "f . g";
    padding: 10px;
    gap: 4px;
    box-shadow: 0 0 24px rgba(0,212,255,0.4), inset 0 1px 0 rgba(255,255,255,0.5);
    transition: transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  #dice.rolling {
    animation: diceRoll 0.5s ease-out;
  }

  @keyframes diceRoll {
    0% { transform: rotate(0deg) scale(1); }
    25% { transform: rotate(-20deg) scale(1.1); }
    50% { transform: rotate(15deg) scale(0.95); }
    75% { transform: rotate(-8deg) scale(1.05); }
    100% { transform: rotate(0deg) scale(1); }
  }

  .dot {
    width: 100%; height: 100%;
    background: #1a0a2e;
    border-radius: 50%;
    display: none;
  }

  .dot.visible { display: block; }

  #dice-value {
    font-family: 'Orbitron', monospace;
    font-size: 2.5rem;
    font-weight: 900;
    color: var(--pi-gold);
    min-width: 40px;
    text-align: center;
    text-shadow: 0 0 12px var(--pi-gold);
  }

  /* ===== BOARD ===== */
  #board-wrapper {
    padding: 12px;
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
    border: 1px solid rgba(123,47,190,0.3);
    box-shadow: 0 0 40px rgba(123,47,190,0.2), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  #board {
    display: grid;
    grid-template-columns: repeat(15, var(--cell));
    grid-template-rows: repeat(15, var(--cell));
    gap: 1px;
    background: rgba(0,0,0,0.5);
    border: 2px solid rgba(240,165,0,0.3);
    border-radius: 4px;
    position: relative;
  }

  .cell {
    width: var(--cell);
    height: var(--cell);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: calc(var(--cell) * 0.35);
    font-weight: 700;
    position: relative;
    cursor: default;
    border-radius: 2px;
    transition: background 0.2s;
  }

  .cell.white { background: rgba(255,255,255,0.9); }
  .cell.red { background: rgba(255,51,102,0.85); }
  .cell.blue { background: rgba(51,102,255,0.85); }
  .cell.green { background: rgba(0,200,100,0.85); }
  .cell.yellow { background: rgba(255,215,0,0.85); }
  .cell.safe { box-shadow: inset 0 0 0 2px rgba(240,165,0,0.8); }
  .cell.star::after {
    content: '★';
    position: absolute;
    font-size: calc(var(--cell) * 0.5);
    color: var(--pi-gold);
    opacity: 0.7;
    pointer-events: none;
  }
  .cell.home-zone { opacity: 1; }
  .cell.center { background: linear-gradient(135deg, #1a0a2e, var(--pi-accent)); }

  .pawn {
    width: 70%;
    height: 70%;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.8);
    position: absolute;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: calc(var(--cell) * 0.3);
    font-weight: 900;
    color: rgba(255,255,255,0.9);
    z-index: 10;
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
  }

  .pawn:hover {
    transform: scale(1.25);
    box-shadow: 0 0 12px currentColor;
    z-index: 20;
  }

  .pawn.movable {
    animation: pulse 0.8s ease-in-out infinite alternate;
    cursor: pointer;
  }

  @keyframes pulse {
    from { transform: scale(1); box-shadow: 0 0 6px currentColor; }
    to { transform: scale(1.2); box-shadow: 0 0 16px currentColor; }
  }

  .pawn[data-player="0"] { background: radial-gradient(circle at 35% 35%, #ff6688, var(--pi-red)); color: white; }
  .pawn[data-player="1"] { background: radial-gradient(circle at 35% 35%, #6688ff, var(--pi-blue)); color: white; }
  .pawn[data-player="2"] { background: radial-gradient(circle at 35% 35%, #44ffaa, var(--pi-green)); color: #1a0a2e; }
  .pawn[data-player="3"] { background: radial-gradient(circle at 35% 35%, #ffe040, var(--pi-yellow)); color: #1a0a2e; }

  /* ===== HOME ZONES (corners) ===== */
  .home-base {
    position: absolute;
    width: calc(var(--cell) * 6 - 4px);
    height: calc(var(--cell) * 6 - 4px);
    border-radius: 8px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 8px;
    padding: 14px;
    z-index: 5;
  }

  .home-base.red-home  { top: 1px; left: 1px; background: rgba(255,51,102,0.25); border: 2px solid rgba(255,51,102,0.5); }
  .home-base.blue-home { top: 1px; right: 1px; background: rgba(51,102,255,0.25); border: 2px solid rgba(51,102,255,0.5); }
  .home-base.green-home { bottom: 1px; right: 1px; background: rgba(0,200,100,0.25); border: 2px solid rgba(0,200,100,0.5); }
  .home-base.yellow-home { bottom: 1px; left: 1px; background: rgba(255,215,0,0.25); border: 2px solid rgba(255,215,0,0.5); }

  .home-slot {
    border-radius: 50%;
    border: 2px dashed rgba(255,255,255,0.3);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ===== CONTROLS ===== */
  #controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 12px 0 20px;
    width: 100%;
    max-width: 600px;
  }

  .ctrl-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ===== TOAST ===== */
  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(20,8,40,0.95);
    border: 1px solid var(--pi-gold);
    border-radius: 8px;
    padding: 12px 24px;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--pi-text);
    backdrop-filter: blur(10px);
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 1000;
    max-width: 320px;
    text-align: center;
    pointer-events: none;
  }

  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ===== WIN OVERLAY ===== */
  #win-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,4,24,0.92);
    backdrop-filter: blur(8px);
    z-index: 500;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
  }

  #win-overlay.show { display: flex; }

  .win-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2rem, 10vw, 4rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--pi-gold), var(--pi-cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
    animation: winPulse 1s ease-in-out infinite alternate;
  }

  @keyframes winPulse {
    from { filter: drop-shadow(0 0 10px rgba(240,165,0,0.5)); }
    to { filter: drop-shadow(0 0 30px rgba(0,212,255,0.8)); }
  }

  .win-sub { font-size: 1.1rem; color: var(--pi-text); text-align: center; }

  /* ===== PI PAYMENT PANEL ===== */
  #payment-panel {
    display: none;
    background: rgba(123,47,190,0.15);
    border: 1px solid rgba(123,47,190,0.4);
    border-radius: 10px;
    padding: 16px 24px;
    text-align: center;
    gap: 10px;
    flex-direction: column;
    align-items: center;
    max-width: 320px;
    width: 90%;
  }

  #payment-panel.show { display: flex; }

  .pay-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    color: var(--pi-gold);
    letter-spacing: 2px;
  }

  .pay-amount {
    font-size: 2rem;
    font-weight: 700;
    color: var(--pi-cyan);
    font-family: 'Orbitron', monospace;
  }

  .pay-desc { font-size: 0.8rem; color: var(--pi-text); opacity: 0.7; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 420px) {
    :root { --board-size: 96vw; }
    .pi-btn { font-size: 0.7rem; padding: 10px 18px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">π ARENA</div>
  <div class="tagline">Ludo Game · Pi Network · Testnet</div>

  <div id="auth-panel">
    <button class="pi-btn btn-connect" id="btn-connect" onclick="connectPi()">
      🪙 Connecter Pi Wallet
    </button>
    <div id="user-info">
      <div class="avatar" id="user-avatar">?</div>
      <div>
        <div id="user-name" style="font-weight:700;"></div>
        <div class="pi-balance" id="user-balance">π Sandbox</div>
      </div>
    </div>
  </div>

  <div id="payment-panel">
    <div class="pay-title">⚡ MISE DE JEU</div>
    <div class="pay-amount">π 0.10</div>
    <div class="pay-desc">Payer pour rejoindre la partie (sandbox testnet)</div>
    <button class="pi-btn btn-pay" onclick="makePayment()">Payer avec Pi</button>
    <button class="pi-btn" style="background:rgba(255,255,255,0.1);font-size:0.7rem;" onclick="skipPayment()">
      Jouer sans payer (démo)
    </button>
  </div>
</header>

<!-- SCORES -->
<div class="scores" id="scores-bar">
  <div class="score-card active-player" data-player="0">
    <div class="score-name">ROUGE</div>
    <div class="score-pawns" id="score-0">🔴🔴🔴🔴</div>
    <div class="score-home" id="home-0">0 / 4 à l'arrivée</div>
  </div>
  <div class="score-card" data-player="1">
    <div class="score-name">BLEU</div>
    <div class="score-pawns" id="score-1">🔵🔵🔵🔵</div>
    <div class="score-home" id="home-1">0 / 4 à l'arrivée</div>
  </div>
  <div class="score-card" data-player="2">
    <div class="score-name">VERT</div>
    <div class="score-pawns" id="score-2">🟢🟢🟢🟢</div>
    <div class="score-home" id="home-2">0 / 4 à l'arrivée</div>
  </div>
  <div class="score-card" data-player="3">
    <div class="score-name">JAUNE</div>
    <div class="score-pawns" id="score-3">🟡🟡🟡🟡</div>
    <div class="score-home" id="home-3">0 / 4 à l'arrivée</div>
  </div>
</div>

<!-- STATUS -->
<div id="status-bar">
  <div id="status-msg">Connecte ton wallet Pi pour commencer !</div>
</div>

<!-- DICE -->
<div id="dice-area">
  <div id="dice">
    <div class="dot" id="d1" style="grid-area:a"></div>
    <div class="dot" id="d2" style="grid-area:b"></div>
    <div class="dot" id="d3" style="grid-area:c"></div>
    <div class="dot" id="d4" style="grid-area:d"></div>
    <div class="dot" id="d5" style="grid-area:e"></div>
    <div class="dot" id="d6" style="grid-area:f"></div>
    <div class="dot" id="d7" style="grid-area:g"></div>
  </div>
  <div id="dice-value">–</div>
</div>

<!-- BOARD -->
<div id="board-wrapper">
  <div id="board"></div>
</div>

<!-- CONTROLS -->
<div id="controls">
  <div class="ctrl-row">
    <button class="pi-btn btn-roll btn-disabled" id="btn-roll" onclick="rollDice()" disabled>
      🎲 Lancer le dé
    </button>
  </div>
  <div class="ctrl-row">
    <button class="pi-btn btn-new-game" onclick="newGame()">🔄 Nouvelle partie</button>
    <button class="pi-btn" style="background:rgba(0,212,255,0.2);font-size:0.7rem;" onclick="showHelp()">
      ℹ️ Règles
    </button>
  </div>
</div>

<!-- WIN OVERLAY -->
<div id="win-overlay">
  <div class="win-title" id="win-title">VICTOIRE !</div>
  <div class="win-sub" id="win-sub"></div>
  <button class="pi-btn btn-new-game" onclick="newGame(); document.getElementById('win-overlay').classList.remove('show')">
    🔄 Rejouer
  </button>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// =============================================
// PI NETWORK SDK INTEGRATION (SANDBOX/TESTNET)
// =============================================
const PI_SDK_VERSION = "2.0";
let piUser = null;
let gameStarted = false;

function initPiSDK() {
  if (typeof Pi !== 'undefined') {
    Pi.init({ version: PI_SDK_VERSION, sandbox: true });
    setStatus("SDK Pi chargé ✓ · Mode sandbox actif");
  } else {
    setStatus("⚠️ Pi SDK non disponible — mode démo");
  }
}

async function connectPi() {
  if (typeof Pi === 'undefined') {
    toast("Pi Browser requis pour l'auth réelle. Mode démo activé.");
    simulateLogin();
    return;
  }
  try {
    const authResult = await Pi.authenticate(
      ['username', 'payments'],
      onIncompletePayment
    );
    piUser = authResult.user;
    showUserInfo(piUser.username);
    document.getElementById('payment-panel').classList.add('show');
    setStatus(`Bienvenue, ${piUser.username} ! Rejoins la partie ↓`);
    toast(`🪙 Connecté : ${piUser.username}`);
  } catch (e) {
    toast("Connexion Pi annulée — mode démo");
    simulateLogin();
  }
}

function simulateLogin() {
  piUser = { username: "Ulrich79" };
  showUserInfo(piUser.username);
  document.getElementById('payment-panel').classList.add('show');
  setStatus("Mode démo · Paye ou joue directement ↓");
}

function showUserInfo(username) {
  document.getElementById('btn-connect').style.display = 'none';
  const ui = document.getElementById('user-info');
  ui.style.display = 'flex';
  document.getElementById('user-name').textContent = username;
  document.getElementById('user-avatar').textContent = username[0].toUpperCase();
}

async function makePayment() {
  if (typeof Pi === 'undefined') {
    toast("🧪 Paiement sandbox simulé — OK !");
    startGame();
    return;
  }
  try {
    const paymentData = {
      amount: 0.10,
      memo: "PiArena – Mise de jeu Ludo",
      metadata: { game: "PiArena", type: "entry_fee" }
    };
    const payment = await Pi.createPayment(paymentData, {
      onReadyForServerApproval: async (paymentId) => {
        // En prod: POST /api/payments/approve { paymentId }
        console.log("Pi payment ready:", paymentId);
      },
      onReadyForServerCompletion: async (paymentId, txid) => {
        // En prod: POST /api/payments/complete { paymentId, txid }
        console.log("Pi payment txid:", txid);
        toast("✅ Paiement Pi confirmé ! Tx: " + txid.slice(0,8) + "…");
        startGame();
      },
      onCancel: (paymentId) => {
        toast("Paiement annulé.");
      },
      onError: (error, payment) => {
        toast("Erreur paiement Pi. Mode démo activé.");
        startGame();
      }
    });
  } catch(e) {
    toast("Pi Browser requis. Mode démo.");
    startGame();
  }
}

function onIncompletePayment(payment) {
  console.log("Incomplete payment found:", payment);
  toast("Paiement incomplet détecté — vérification...");
}

function skipPayment() {
  document.getElementById('payment-panel').classList.remove('show');
  toast("Mode démo · Bonne partie !");
  startGame();
}

// =============================================
// GAME ENGINE – LUDO
// =============================================

const BOARD_SIZE = 15;
const PLAYERS = 4;
const PAWNS_PER_PLAYER = 4;
const PLAYER_COLORS = ['red', 'blue', 'green', 'yellow'];
const PLAYER_NAMES = ['Rouge', 'Bleu', 'Vert', 'Jaune'];
const PLAYER_EMOJIS = ['🔴', '🔵', '🟢', '🟡'];

// Starting positions on the main track (0-indexed, 52 cells)
const START_POSITIONS = [0, 13, 26, 39];
// Safe squares (star positions)
const SAFE_SQUARES = [0, 8, 13, 21, 26, 34, 39, 47];
// Home column start positions on track
const HOME_COL_ENTRY = [50, 11, 24, 37]; // track index before home column

// Board layout: 15x15 grid definition
// We'll represent the track as ordered (row, col) pairs
const TRACK = buildTrack();

function buildTrack() {
  // Classic Ludo 52-cell track mapped to 15x15 board
  const t = [];
  // Bottom-left going up (col 6, rows 14→9)
  for (let r = 14; r >= 9; r--) t.push([r, 6]);
  // Left side going right (row 8, cols 5→0) — hmm, standard ludo
  // Actually let's define the standard path:

  // Row by row for classic Ludo (0-indexed):
  // Starting at red start square (row=13, col=6)
  const path = [
    // Red starting column (bottom, going up)
    [13,6],[12,6],[11,6],[10,6],[9,6],
    // Top-left corridor
    [8,5],[8,4],[8,3],[8,2],[8,1],[8,0],
    // Top of left side going up
    [7,0],[6,0],
    // Top row going right
    [6,1],[6,2],[6,3],[6,4],[6,5],
    // Top corridor going down into top
    [5,6],[4,6],[3,6],[2,6],[1,6],[0,6],
    // Top-right
    [0,7],[0,8],
    [1,8],[2,8],[3,8],[4,8],[5,8],
    [6,9],[6,10],[6,11],[6,12],[6,13],[6,14],
    [7,14],[8,14],
    [8,13],[8,12],[8,11],[8,10],[8,9],
    [9,8],[10,8],[11,8],[12,8],[13,8],[14,8],
    [14,7],[14,6] // back to near start — this is 52 cells
  ];
  // Trim to 52 if needed
  return path.slice(0, 52);
}

// Game state
let state = {
  currentPlayer: 0,
  diceValue: 0,
  diceRolled: false,
  pawns: [], // [player][pawn] = { pos: -1 (home), 0-51 (track), 56 (finished) }
  finished: [], // [player] = count of pawns at end
  gameOver: false,
  humanPlayers: [true, false, false, false] // only player 0 is human, others AI
};

function newGame() {
  state = {
    currentPlayer: 0,
    diceValue: 0,
    diceRolled: false,
    pawns: Array.from({length: PLAYERS}, () =>
      Array.from({length: PAWNS_PER_PLAYER}, () => ({ pos: -1 }))
    ),
    finished: [0, 0, 0, 0],
    gameOver: false,
    humanPlayers: [true, false, false, false]
  };
  renderBoard();
  updateScores();
  setStatus(`C'est au tour de ${PLAYER_NAMES[0]} (${PLAYER_EMOJIS[0]})`);
  document.getElementById('win-overlay').classList.remove('show');
  if (gameStarted) enableRoll(true);
}

function startGame() {
  gameStarted = true;
  document.getElementById('payment-panel').classList.remove('show');
  newGame();
  toast("🎮 Partie lancée ! À toi de jouer !");
}

// =============================================
// DICE
// =============================================
const DICE_PATTERNS = {
  1: [4],
  2: [1, 7],
  3: [1, 4, 7],
  4: [1, 3, 5, 7],
  5: [1, 3, 4, 5, 7],
  6: [1, 2, 3, 5, 6, 7]
};

function showDice(val) {
  for (let i = 1; i <= 7; i++) {
    document.getElementById('d' + i).classList.remove('visible');
  }
  (DICE_PATTERNS[val] || []).forEach(i => {
    document.getElementById('d' + i).classList.add('visible');
  });
  document.getElementById('dice-value').textContent = val;
}

function rollDice() {
  if (!gameStarted || state.diceRolled || state.gameOver) return;
  const diceEl = document.getElementById('dice');
  diceEl.classList.add('rolling');
  setTimeout(() => diceEl.classList.remove('rolling'), 500);

  const val = Math.floor(Math.random() * 6) + 1;
  state.diceValue = val;
  state.diceRolled = true;
  showDice(val);

  enableRoll(false);

  setTimeout(() => {
    const p = state.currentPlayer;
    const movable = getMovablePawns(p, val);

    if (movable.length === 0) {
      toast(`${PLAYER_NAMES[p]} : aucun mouvement possible`);
      nextTurn();
    } else if (state.humanPlayers[p]) {
      setStatus(`Tu as fait ${val}. Clique sur un pion !`);
      highlightMovable(p, movable);
    } else {
      // AI plays automatically
      const choice = movable[Math.floor(Math.random() * movable.length)];
      setTimeout(() => movePawn(p, choice, val), 600);
    }
  }, 550);
}

function getMovablePawns(player, diceVal) {
  const movable = [];
  for (let i = 0; i < PAWNS_PER_PLAYER; i++) {
    const pos = state.pawns[player][i].pos;
    if (pos === 56) continue; // already home
    if (pos === -1) {
      if (diceVal === 6) movable.push(i); // needs 6 to exit
    } else {
      const newPos = getNewPos(player, pos, diceVal);
      if (newPos !== null) movable.push(i);
    }
  }
  return movable;
}

function getNewPos(player, currentPos, steps) {
  // Convert track position to absolute track index
  const absStart = START_POSITIONS[player];
  const relPos = (currentPos - absStart + 52) % 52;
  const newRel = relPos + steps;

  // Home column: last 5 steps are exclusive to this player
  if (newRel >= 52) return null; // overshot
  if (newRel > 51) return null;

  const newAbs = (absStart + newRel) % 52;
  return newAbs;
}

function movePawn(player, pawnIdx, steps) {
  clearHighlights();
  const pawn = state.pawns[player][pawnIdx];
  let landed;

  if (pawn.pos === -1) {
    // Exit home base
    pawn.pos = START_POSITIONS[player];
    landed = pawn.pos;
    toast(`${PLAYER_EMOJIS[player]} sort un pion !`);
  } else {
    const newPos = getNewPos(player, pawn.pos, steps);
    if (newPos === null) {
      nextTurn();
      return;
    }
    // Check landing
    const relPos = (pawn.pos - START_POSITIONS[player] + 52) % 52;
    const newRel = relPos + steps;
    if (newRel >= 50) {
      // Entering home stretch — simplified: mark as finished
      pawn.pos = 56;
      state.finished[player]++;
      toast(`${PLAYER_EMOJIS[player]} pion arrivé ! 🎉`);
      renderBoard();
      updateScores();
      checkWin(player);
      if (!state.gameOver) nextTurn();
      return;
    }
    pawn.pos = newPos;
    landed = newPos;

    // Capture check
    checkCapture(player, pawnIdx, landed);
  }

  renderBoard();
  updateScores();

  // Bonus roll on 6
  if (steps === 6) {
    toast(`${PLAYER_EMOJIS[player]} fait 6 — rejoue !`);
    state.diceRolled = false;
    if (state.humanPlayers[player]) enableRoll(true);
    else setTimeout(rollDiceForAI, 800);
  } else {
    nextTurn();
  }
}

function checkCapture(attacker, attackerPawnIdx, pos) {
  if (SAFE_SQUARES.includes(pos)) return;
  for (let p = 0; p < PLAYERS; p++) {
    if (p === attacker) continue;
    for (let i = 0; i < PAWNS_PER_PLAYER; i++) {
      if (state.pawns[p][i].pos === pos) {
        state.pawns[p][i].pos = -1; // send back home
        toast(`${PLAYER_EMOJIS[attacker]} capture un pion ${PLAYER_NAMES[p]} !`);
      }
    }
  }
}

function checkWin(player) {
  if (state.finished[player] >= PAWNS_PER_PLAYER) {
    state.gameOver = true;
    document.getElementById('win-title').textContent =
      `${PLAYER_EMOJIS[player]} VICTOIRE !`;
    document.getElementById('win-sub').textContent =
      `${PLAYER_NAMES[player]} remporte PiArena ! 🏆` +
      (piUser ? `\nBravo ${piUser.username} !` : '');
    document.getElementById('win-overlay').classList.add('show');
    enableRoll(false);
  }
}

function nextTurn() {
  state.diceRolled = false;
  state.currentPlayer = (state.currentPlayer + 1) % PLAYERS;
  const p = state.currentPlayer;

  // Update active player highlight
  document.querySelectorAll('.score-card').forEach((c, i) => {
    c.classList.toggle('active-player', i === p);
  });

  setStatus(`Tour de ${PLAYER_NAMES[p]} ${PLAYER_EMOJIS[p]}`);

  if (state.humanPlayers[p]) {
    enableRoll(true);
  } else {
    setTimeout(rollDiceForAI, 900);
  }
}

function rollDiceForAI() {
  if (state.gameOver) return;
  rollDice();
}

// =============================================
// RENDERING
// =============================================
function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  // Create 15x15 cells
  for (let r = 0; r < 15; r++) {
    for (let c = 0; c < 15; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r;
      cell.dataset.c = c;
      colorCell(cell, r, c);
      board.appendChild(cell);
    }
  }

  // Add home bases (overlays)
  addHomeBases(board);

  // Place pawns on track
  for (let p = 0; p < PLAYERS; p++) {
    for (let i = 0; i < PAWNS_PER_PLAYER; i++) {
      const pawn = state.pawns[p][i];
      if (pawn.pos === -1) {
        placeInHomBase(board, p, i);
      } else if (pawn.pos !== 56) {
        placeOnTrack(board, p, i, pawn.pos);
      }
      // 56 = finished, no render needed
    }
  }

  // Center decoration
  const center = getCellAt(board, 7, 7);
  if (center) {
    center.className = 'cell center';
    center.textContent = 'π';
    center.style.cssText += 'font-family:Orbitron,monospace;font-size:calc(var(--cell)*0.6);color:var(--pi-gold);font-weight:900;';
  }
}

function colorCell(cell, r, c) {
  // Corner home zones (6x6)
  if (r <= 5 && c <= 5) { cell.classList.add('red', 'home-zone'); return; }
  if (r <= 5 && c >= 9) { cell.classList.add('blue', 'home-zone'); return; }
  if (r >= 9 && c >= 9) { cell.classList.add('green', 'home-zone'); return; }
  if (r >= 9 && c <= 5) { cell.classList.add('yellow', 'home-zone'); return; }

  // Center (finish triangle area)
  if (r >= 6 && r <= 8 && c >= 6 && c <= 8) {
    if (r === 7 && c === 7) return; // center handled separately
    // Colored triangles
    if (r === 6 && c === 6) { cell.classList.add('red'); return; }
    if (r === 6 && c === 8) { cell.classList.add('blue'); return; }
    if (r === 8 && c === 8) { cell.classList.add('green'); return; }
    if (r === 8 && c === 6) { cell.classList.add('yellow'); return; }
    if (r === 7 && c === 6) { cell.classList.add('red'); return; }
    if (r === 6 && c === 7) { cell.classList.add('blue'); return; }
    if (r === 7 && c === 8) { cell.classList.add('green'); return; }
    if (r === 8 && c === 7) { cell.classList.add('yellow'); return; }
    cell.classList.add('white'); return;
  }

  // Track cells
  cell.classList.add('white');

  // Colored track indicators for starting squares
  // Red start: (13,6)
  if (r === 13 && c === 6) { cell.classList.add('red'); cell.classList.add('safe'); return; }
  if (r === 1 && c === 8) { cell.classList.add('blue'); cell.classList.add('safe'); return; }
  if (r === 6 && c === 1) { cell.classList.add('green'); cell.classList.add('safe'); return; }
  if (r === 8 && c === 13) { cell.classList.add('yellow'); cell.classList.add('safe'); return; }

  // Safe star squares
  if ((r === 6 && c === 2) || (r === 2 && c === 6) || (r === 6 && c === 12) ||
      (r === 12 && c === 8) || (r === 8 && c === 2) || (r === 12 && c === 6) ||
      (r === 8 && c === 12) || (r === 2 && c === 8)) {
    cell.classList.add('safe');
  }
}

function addHomeBases(board) {
  const bases = [
    { cls: 'red-home', player: 0 },
    { cls: 'blue-home', player: 1 },
    { cls: 'green-home', player: 2 },
    { cls: 'yellow-home', player: 3 }
  ];
  bases.forEach(b => {
    const div = document.createElement('div');
    div.className = `home-base ${b.cls}`;
    div.dataset.homePlayer = b.player;
    for (let s = 0; s < 4; s++) {
      const slot = document.createElement('div');
      slot.className = 'home-slot';
      slot.dataset.slot = s;
      div.appendChild(slot);
    }
    board.appendChild(div);
  });
}

function placeInHomBase(board, player, pawnIdx) {
  const base = board.querySelector(`.home-base[data-home-player="${player}"]`);
  if (!base) return;
  const slot = base.querySelectorAll('.home-slot')[pawnIdx];
  if (!slot) return;
  const pawn = makePawn(player, pawnIdx);
  pawn.style.position = 'relative';
  pawn.style.width = '80%';
  pawn.style.height = '80%';
  slot.appendChild(pawn);
}

function placeOnTrack(board, player, pawnIdx, trackPos) {
  if (trackPos < 0 || trackPos >= TRACK.length) return;
  const [r, c] = TRACK[trackPos];
  const cell = getCellAt(board, r, c);
  if (!cell) return;
  const pawn = makePawn(player, pawnIdx);
  // Offset if multiple pawns on same cell
  const existing = cell.querySelectorAll('.pawn').length;
  if (existing > 0) {
    pawn.style.transform = `translate(${existing * 4}px, ${existing * -4}px)`;
  }
  cell.appendChild(pawn);
}

function makePawn(player, pawnIdx) {
  const pawn = document.createElement('div');
  pawn.className = 'pawn';
  pawn.dataset.player = player;
  pawn.dataset.pawn = pawnIdx;
  pawn.textContent = ['R','B','V','J'][player] + (pawnIdx + 1);
  pawn.style.color = ['white','white','#1a0a2e','#1a0a2e'][player];
  pawn.onclick = () => onPawnClick(player, pawnIdx);
  return pawn;
}

function getCellAt(board, r, c) {
  return board.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
}

function highlightMovable(player, movableIndices) {
  document.querySelectorAll('.pawn').forEach(p => {
    const pi = parseInt(p.dataset.player);
    const idx = parseInt(p.dataset.pawn);
    if (pi === player && movableIndices.includes(idx)) {
      p.classList.add('movable');
    }
  });
}

function clearHighlights() {
  document.querySelectorAll('.pawn.movable').forEach(p => p.classList.remove('movable'));
}

function onPawnClick(player, pawnIdx) {
  if (!state.humanPlayers[player]) return;
  if (player !== state.currentPlayer) return;
  if (!state.diceRolled) return;
  const movable = getMovablePawns(player, state.diceValue);
  if (!movable.includes(pawnIdx)) {
    toast("Ce pion ne peut pas bouger !");
    return;
  }
  movePawn(player, pawnIdx, state.diceValue);
}

// =============================================
// SCORES
// =============================================
function updateScores() {
  for (let p = 0; p < PLAYERS; p++) {
    const total = PAWNS_PER_PLAYER;
    const atHome = state.finished[p];
    const inBase = state.pawns[p].filter(pw => pw.pos === -1).length;
    const onTrack = total - atHome - inBase;
    document.getElementById('home-' + p).textContent =
      `${atHome} / ${total} à l'arrivée`;
  }
}

// =============================================
// UTILS
// =============================================
function setStatus(msg) {
  document.getElementById('status-msg').textContent = msg;
}

function enableRoll(enabled) {
  const btn = document.getElementById('btn-roll');
  btn.disabled = !enabled;
  btn.classList.toggle('btn-disabled', !enabled);
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}
